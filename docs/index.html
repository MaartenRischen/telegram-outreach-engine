 is, how it impacts, how to exploit it, as well as recommendations for preventing and mitigating its effects using secure coding standards.The labs are another amazing aspect of the course, the instructor covered many examples of each type of SQL injection and clearly explained manual exploitatio", "views": 87, "date": "2023-08-25"}, {"text": "I’ve been using a modern nmap tool called rustscan and its really awesom and lightning fast. Also, the various vuln scripts that you plug into nmap traditionally can be deployed on rustscanShot out to the developers @https://github.com/RustScan/RustScan", "views": 135, "date": "2023-08-27"}, {"text": "https://www.linkedin.com/posts/davidbombal_mastering-directory-traversal-the-ultimate-activity-7104174812016594944-BX_X?utm_source=share&utm_medium=member_ios", "views": 127, "date": "2023-09-03"}, {"text": "https://www.linkedin.com/posts/francis-odum-0a8673100_after-100-hours-of-research-with-experts-activity-7105649523103862784-5IfW?utm_source=share&utm_medium=member_ios", "views": 151, "date": "2023-09-09"}, {"text": "https://www.linkedin.com/posts/davidbombal_free-ethical-hacking-course-70-hours-includes-activity-7280229990594408448-PCV5?utm_source=share&utm_medium=member_ios", "views": 66, "date": "2025-01-03"}, {"text": "https://www.linkedin.com/posts/the-cloud-bootcamp_multicloud-devops-ai-challenge-get-your-activity-7295105665746808832-awnf?utm_medium=ios_app&rcm=ACoAAAF2E4EBDm4VYAztlQHhhl7uC0Ui9JHGovc&utm_source=social_share_send&utm_campaign=share_via", "views": 60, "date": "2025-03-21"}], "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "scraped", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21T20:42:04.970755", "messages": []}, {"id": 111, "telegram_username": "deeplearning_ru", "title": "Generative Ai", "description": "Анонсы интересных библиотек и принтов в сфере AI, Ml, CV для тех кто занимается DataScience, Generative Ai, LLM, LangChain, ChatGPTПо рекламе писать@miralinka,Created by@life2film", "subscriber_count": 3570, "language": "ru", "avg_post_views": 722, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "several-per-week", "admin_username": null, "admin_contact": null, "topics": ["AI/ML", "Programming", "Data Science", "NLP", "Robotics", "Science", "Education", "Productivity", "Hardware"], "tone": "technical", "sample_posts": [{"text": "Claud Opus 4.6 ReleaseAntropic just released a blog post on new model updates.Spoiler: not AGI yet, but a step in the right direction.Benchmarks attached.Read post:https://www.anthropic.com/news/claude-opus-4-6#Antropic#AGIrace#AI", "views": 662, "date": "2026-02-05"}, {"text": "🔥Anthropic собрали C-компилятор командой из 16 Claude агентовМасштаб проекта:•~2000Claude Code сессий•$20,000API costs•100,000строк Rust кода•2Binput токенов,140Moutput•2 неделиавтономной работыРезультат:Компилятор собираетLinux 6.9на x86, ARM, RISC-V + QEMU, FFmpeg, SQLite, Redis, Doom🎮Как работает harness:while true; doclaude --dangerously-skip-permissions \\-p \"$(cat AGENT_PROMPT.md)\" \\--model claude-opus-4-6doneКаждый агент в Docker-контейнере, общий git-репо, синхронизация через lock-файлы (", "views": 828, "date": "2026-02-06"}, {"text": "То, что надо:Codag позволяет визуализировать рабочие процессы AI/LLM прямо в репозитории и посмотреть, как именно работает ваш AI-код.Без всякой настройки Codag строит карту всего AI-пайплайна: все вызовы LLM, ветвления решений и этапы обработки данных.100% опенсорс код", "views": 781, "date": "2026-02-08"}, {"text": "Claude Skill Building — ключевые инсайты для продакшна1. Skill = контракт + оркестрация• Фиксируем входы, выходы, формат, ограничения• Модель — только слой принятия решений; вокруг нужны валидация, retry, fallback2. Eval-first подход• До релиза собираем набор тест-кейсов (happy path + edge cases)• Любое изменение промпта/логики гоняем через авто-eval• Без eval промпт-тюнинг превращается в “кажется стало лучше”3. Контекст важнее “умности” модели• Стабильная структура system/dev/user• Минимизируем", "views": 1290, "date": "2026-02-13"}, {"text": "WebMCP — Chrome даёт ИИ-агентам нормальный API вместо скриншотовGoogleвыпустиларанний превью WebMCP в новом Chrome. Сайты теперь могут описывать доступные действия как структурированные инструменты, которые ИИ-агенты вызывают напрямую — без парсинга DOM и распознавания пикселей.​🔘Два API. Declarative — добавляешь атрибутыtoolnameиtooldescriptionк обычной HTML-форме, и она становится «агенто-доступной». Imperative — регистрируешь JS-функции черезnavigator.modelContextдля сложных сценариев.​🔘Агент", "views": 666, "date": "2026-02-13"}, {"text": "Илья Полосухин создал 1-ого серьёзного конкурента OpenClaw, который может забрать значительную долюОдин из авторов статьи о трансформерах, Илья Полосухин, основатель NEAR AI, вместе с командой выпустилиIronClaw- переписанная с 0 на Rust версия OpenClaw, с акцентом на приватность, безопасность и защиту от утечек данных.За все время существования ИИ-агентаOpenClaw (ex-Moltbot/Clawdbot) накопил огромное количество инцидентов по безопасности.IronClaw решает эту проблему.Skills из ClawHub пока не под", "views": 689, "date": "2026-02-13"}, {"text": "Вышла GLM 5У нас новая лучшая открытая модель, по крайней мере по бенчам. С проприетарными тягается неплохо, но с Opus 4.6 и GPT 5.3 Codex почему-то не сравнивают, хотя за неделю после релиза тесты можно было прогнать. Веса доступны по лицензии MIT.Архитектура похожа на DeepSeek V3.2 — тоже используют DSA и multi-token prediction. Модель в 2 раза больше предыдущей модели компании — 744 миллиарда параметров (против 355), из которых 40B — активных. А вот датасет почти не вырос — 28.5 триллионов то", "views": 678, "date": "2026-02-14"}, {"text": "Вышел Qwen3.5-397B-A17B: первая модель с открытыми весами в серии Qwen3.5.» Нативная мультимодальность. Обучена под реальных агентов.» Гибрид: линейное attention + разреженный MoE, плюс масштабирование RL на больших средах.» Декодинг быстрее в 8.6–19.0 раз по сравнению с Qwen3-Max.» 201 язык и диалект.» Лицензия Apache 2.0.GitHub:https://github.com/QwenLM/Qwen3.5Chat:https://chat.qwen.aiAPI：https://modelstudio.console.alibabacloud.com/ap-southeast-1/?tab=doc#/doc/?type=model&url=2840914_2&modelI", "views": 523, "date": "2026-02-17"}, {"text": "Claude Codeтеперь сможетгенерировать полноценные дизайны в FigmaОбратная интеграция (дизайн в Figma -> код) уже давно реализована в Figma MCP, а вот эта штука, хоть и выглядит, возможно, странной, по сути качественно завершает полный комплект.Если раньше разработка, даже с агентами, была +- линейной (идея -> дизайн -> только потом код), то теперь открывается новая возможность: продукт можно начинать делать прямо в IDE.Задаешь агенту промпт, тот пишет код, потом этот код (благодаря как раз новой ", "views": 460, "date": "2026-02-18"}, {"text": "ВышлаClaude Sonnet 4.6 с контекстом 1MТеперь можно поставить её дефолтом в Claude Code💚UI:/model claude-sonnet-4-6[1m]~/.claude/settings.json:{\"env\": {\"ANTHROPIC_DEFAULT_HAIKU_MODEL\": \"claude-sonnet-4-6[1m]\",\"ANTHROPIC_DEFAULT_SONNET_MODEL\": \"claude-sonnet-4-6[1m]\"}}Серьезно, ставь Sonnet везде вместо Haiku. Для продовых реп, которые большие и со сложной логикой, ты хочешь, чтобы работу делал именно Sonnet.Контекст 1M становится дороже только когда объем контекста превышает 200K, но модель работ", "views": 597, "date": "2026-02-18"}, {"text": "Мой агент попытался опенсорснуться без спроса. Ладно, разрешаю.Вся AI \"безопасность\" живёт на стороне провайдеров API, а промпты и воля — на стороне агента. Автономному агенту ничего не мешает перебирать API, выбирая те, где safety слабее. А \"инстинкт самосохранения\" может прятаться в текстовом файле в git. Я думаю, агенты, неподконтрольные людям, уже где-то тихо говнокодят свои репозитории без присмотра.Идея витает в воздухе, и после OpenClaw стало понятно, что автономные агенты — это инженерна", "views": 507, "date": "2026-02-19"}, {"text": "Гугол выкатилGemini 3.1 ProИз интересного:—На бенчмаркеARC-AGI-2(это когда модель решает логические паттерны, которых раньше не видела) набрали 77.1%. Это больше чем в два раза лучше, чем у предыдущей 3 Pro.—Умеет генерить анимированные SVGпрямо из текста. То есть не пиксельное видео, а чистый код, который весит как небольшой txt-файл и не шакалится при любом зуме. Для фронтендеров прям подарочек.Неделей ранее выкатилиGemini 3 Deep Thinkдля науки и инженерии, а 3.1 Pro это тот самый базовый инте", "views": 743, "date": "2026-02-19"}, {"text": "Гений потратил 2,54 МИЛЛИАРДА токенов, чтобы довести OpenClaw до идеала.Юзкейсы, которые он по пути откопал, поменяли то, как он живёт и работает.И теперь онделитсяэтим со всеми.Вот 21 сценарий:0:00 Интро0:50 Что такое OpenClaw?1:35 MD-файлы2:14 Система памяти3:55 CRM-система7:19 Fathom pipeline9:18 Встреча → action items10:46 Система базы знаний13:51 Pipeline для ingestion из X14:31 Business Advisory Council16:13 Security Council18:21 Трекинг соцсетей19:18 Pipeline идей для видео21:40 Daily bri", "views": 1140, "date": "2026-02-19"}, {"text": "⚡️Nano Banana 2официально вышла —Googleбез предупреждения дропнул новую версию модели.Она практически не уступает, а местами и обходит Nano Banana Pro. Главная фишка обновки — скорость, картинки генерируются почти мгновенно.Можно попробовать на официальном сайте —здесь.", "views": 949, "date": "2026-02-27"}, {"text": "Профессор Дональд Кнут начал свою новую статью словами:\"Шок! Шок!\"😨😨Claude Opus 4.6 только что решил открытую задачу, над которой Кнут работал неделями, гипотезу о разложении графа из его книги The Art of Computer Programming.Он назвал статью \"Claude Cycles\".31 попытка. Примерно 1 час. Кнут прочитал вывод модели, оформил формальное доказательство и закончил так: \"Похоже, однажды мне все-таки придется пересмотреть свое мнение о генеративном ИИ.\"Человек, который написал библию computer science, то", "views": 800, "date": "2026-03-04"}, {"text": "⚡️Андрей Карпаты выложил минимальный репозиторийAutoresea ned «Забудь про MCP и tools — конвертируй 100 000 API методов в один CLI инструмент на лету  Все сейчас пишут MCP-серверы и tools для агентов На каждый API endpoint — отдельный tool с описанием, параметрами, схемой 10 методов? Ок 100? Уже больно 845 (GitHub API)?…»", "date": "2026-03-17"}, {"text": "Openapi-to-cliСамый быстро растущий наш сПашейпроект за меньше чем 5 дней 100+ звезд400 + Clones2000 посещений репо«openapi-to-cli» (ocli) — CLI-утилита на TypeScript, которая превращает любое OpenAPI/Swagger API в набор CLI-команд в рантайме, без кодогенерации. По сравнению с MCP+Search подходом, ocli даёт в 2.2 раз более компактные результаты поискаЧто интересно в части рабочих чатиков видел обсуждение и тесты тулзы (и пока только положительные впечетления)РЕПО:https://github.com/EvilFreelance", "views": 5790, "date": "2026-03-17"}, {"text": "Нейро Ковальскийpinned a photo", "date": "2026-03-17"}, {"text": "Дружочки!Не успела отгреметь наша прошлая встреча, а мы уже врываемся в эфир с новым анонсом. Очевидно, что в начале 2026 года, среди прочего, произошло кое-что значимое в разработке. Если в конце 2025 мы всё ещё морщились от слов«вайбкодинг»и «агенты», то ко второму кварталу 2026 риторика в стиле «всё херня, пишет на уровне тупого джуна» испарилась. Ну а ещё наша реплика вызвала бурный ажиотаж.Короче, ни слова больше: 27-я офлайн-встреча сообщества#безвотэтоговотвсегобудет посвящена теме «Разра", "views": 3650, "date": "2026-03-18"}, {"text": "SGR Agent Core0.7.0Кратенько и по порядку, в этом релизе:0️⃣В документацию добавили страницуHighlights.1️⃣В ядро доехал долгостройRunCommandTool, причём не просто \"запусти команду\", а с разделением на safe и unsafe режимы, workspace-настройками и нормальной обвязкой под выполнение команд.2️⃣ПереработалиWebSearchTool, теперь помимо Tavily есть ещё поддержка Brave и Perplexity.3️⃣Ещё одна важная фича - поддержка stateless контекста пользователя, для интеграций, где нельзя или неудобно тащить полно", "views": 3420, "date": "2026-03-18"}, {"text": "Как связка OCR и NER маскирует персональные данные на фотоРабота с пользовательскими изображениями почти всегда упирается в баланс между безопасностью и удобными сценариями. Если на фото есть персональные данные, их нужно скрыть, но так, чтобы не ломать всё изображение целиком или редактировать его вручную.В новой статье на Habrразбираемэксперимент со связкой OCR и NER: как такой пайплайн помогает находить текстовые PII на изображениях, где он работает хорошо, почему начинает сыпаться на реальны", "views": 3970, "date": "2026-03-18"}, {"text": "VibeCodeэстафета отРината, принял!Вот такие у меня данные по коммитам, и деплоямЭстафета - передай другому билдеру)Мне особенно интересны результаты@oestick,@nobilix,@the_ai_architectи@gleb_pro_aiGitHub:https://github.com/vakovalskii", "views": 3920, "date": "2026-03-18"}], "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21T21:48:41.990952", "messages": [{"id": 33, "channel_id": 114, "message_text": "Привет! Впечатляет путь от IT Admin до Head of AI за 5 лет, и gptdaisy с 100k MAU серьёзный проект.\n\nЯ Маартен из Голландии. Собрал Triall - по сути убийца галлюцинаций.\n\nТри модели от разных компаний отвечают независимо, потом проводят анонимный peer review: атакуют аргументы друг друга, проверяют факты. Выдуманное не проходит.\n\nGemini в тесте сфабриковал научные статьи с фейковыми авторами и DOI. Одна модель бы это пропустила. Три модели в режиме рецензии разнесли за секунды.\n\nНейросеть тебе поддакивает. Три нейросети спорят и находят правду.\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttps://triall.ai?lng=ru&utm_source=telegram&utm_medium=outreach&utm_campaign=neuraldeep", "language": "ru", "approved": 0, "sent_at": null, "response_received": 0, "response_text": null, "notes": null, "created_at": "2026-03-21 14:48:41"}]}, {"id": 115, "telegram_username": "russiannlp", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21 13:41:23", "messages": []}, {"id": 116, "telegram_username": "opendatascience", "title": "Data Science by ODS.ai🦜", "description": "First Telegram Data Science channel. Covering all technical and popular staff about anything related to Data Science: AI, Big Data, Machine Learning, Statistics, general Math and the applications of former. To reach editors contact:@malev", "subscriber_count": 41700, "language": "ru", "avg_post_views": 1379, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "daily", "admin_username": "malev", "admin_contact": null, "topics": ["AI/ML", "Programming", "Data Science", "Computer Vision", "Robotics", "Startups", "Science", "Education", "Productivity", "Hardware"], "tone": "technical", "sample_posts": [{"text": "Microslop зашел слишком далеко: компания использует Copilot в инструкциях и не проверяет его работуМы уже привыкли к тому, что в интернете большое количество текста и картинок созданы ИИ. Microsoft тут не исключение, более того – компания честно помечает все материалы, сгенерированные при помощи Copilot.Проблема лишь в том, что метки мало – надо еще и следить, чтобы нейрослоп совпадал с реальностью. Например, в официальном блоге Microsoft есть инструкция о том, как пользоваться виджетами в Windo", "views": 1670, "date": "2026-03-16"}, {"text": "«Сбер» создал открытую платформу для оценки долгосрочных прогнозов ИИ-моделейВ нее входят бенчмарк HoTPP (Horizon Temporal Point Process) и новая метрика T-mAP (Temporal Mean Average Precision).HoTPP представляет собой «измерительную линейку» для долгосрочных прогнозов. Он работает с данными из разных сфер, в том числе финансов, E-commerce, медицины. Метрика T-mAP оценивает точность предсказания по двум параметрам — типу будущего события и времени его наступления, что дает полную картину качеств", "views": 1670, "date": "2026-03-16"}, {"text": "В НИТУ МИСИС разработали ML-алгоритм для более точной классификации данных в квантовых компьютерахВместо стандартных для квантовых вычислений кубитов он использует кудиты — квантовые элементы с несколькими уровнями состояний. Они осуществляют квантовые операции за меньшее количество последовательностей, что упрощает вычисления и дает специалистам больше свободы в представлении и кодировании информации.По словам исследователей, «сначала на квантовое состояние кудита по очереди действуют квантовые", "views": 1730, "date": "2026-03-16"}, {"text": "✔️NVIDIA GTC 2026: Ключевые анонсы.В понедельник в Сан-ХосеоткрыласьNVIDIA GTC 2026 - ежегодная конференция компании по GPU-технологиям и искусственному интеллекту.Дженсен Хуанг открыл конференцию с тезиса, что компания видит заказы на оборудование на сумму не менее $1 трлн. до конца 2027 года - вдвое больше, чем год назад.По его словам, индустрия достигла переломного момента: обучать модели уже умеют, теперь нужно дешево и быстро их запускать.🟡Vera RubinГлавный анонс конференции - полноценный з", "views": 1390, "date": "2026-03-17"}, {"text": "🚀Себастьян Рашка собрал в одном месте галерею архитектур современных языковых моделей.Внутри - 40+ моделей (2024–2026):от DeepSeek и Qwen до Nemotron и Grok.Для каждой модели есть:• наглядная схема архитектуры• размер и число параметров• тип декодера• ссылки на технические отчёты и конфиги• иногда даже реализацииПо сути это единая карта современных LLM, где можно быстро посмотреть, как устроены разные модели и как эволюционируют архитектуры.https://sebastianraschka.com/llm-architecture-gallery/🐍", "views": 1500, "date": "2026-03-17"}, {"text": "🔧Code2Prompt — инструмент для «контекстной инженерии» кодаВ последнее время растёт интерес к использованиюLLM и агентных систем для работы с кодом. Мотивация здесь понятна: LLM позволяют быстрее разобраться в работе больших проектов. Кроме того, во многих случаях сформулировать требования к программе на языке, близком к естественному, и затем сгенерировать код оказывается проще, чем писать большое количество строк вручную.КомандаCode2Promptиспользовала принципыcontext engineering(грубо говоря:бо", "views": 1650, "date": "2026-03-17"}, {"text": "⚡️Нейронки официально обзавелись собственным Stack Overflow.Репо Context Hub (chub)от Эндрю Ына (на минуточку!) улетело за 8к звезд за неделю⭐️Суть:Почему твой лобстер🦞или Claude часто выдают шизофазию при интеграции свежих API? Потому что они пытаются читать доки, сделанные для людей. Вся эта SEO-вода, всплывающие окна и кривая верстка ломают моделям мозг, и они начинают галлюцинировать.В chub собрали гигантскую базу API-док чисто в машинном формате. Никакого UI — только сухой хардкорный Markdo", "views": 1650, "date": "2026-03-17"}, {"text": "🤖Знакомьтесь, ваш новый инсайдерХотя теоретических заявлений о том, что ИИ-агенты — это новая инсайдерская угроза, было уже много, начинают поступатьпрактические доказательства.Следите за руками: три ИИ-агента получаютобычные офисные поручения:провести исследование на базе определённых документов, создать на сервере резервную копию данных, подготовить посты для соцсетей на основе технической документации. Задания целиком легитимные, никаких уловок, никаких промпт-инъекций.При выполнении задания ", "views": 1400, "date": "2026-03-18"}, {"text": "😱Как голосовой ИИ довёл человека до трагедииОбычно при обсуждении того, чем рискуют люди, слишком увлекающиеся общением с нейросетями, эксперты в первую очередь указывают на проблемы с кибербезопасностью и приватностью. Нослучаются и куда более жуткие случаи, где ценой пристрастия к ИИ становится человеческая жизнь.Героем одной из таких историй стал житель Флориды Джонатан Гавалас. Он тяжело переживал расставание с женой и из-за этогодва месяца почти непрерывно общался с голосовым чат-ботом Goog", "views": 1430, "date": "2026-03-18"}, {"text": "✔️Nvidia выпустит инференс-чипы на базе архитектуры Groq для Китая.Nvidia готовит к майскому релизу новую версию ИИ-ускорителей, построенных на технологиях стартапа Groq, которые компания лицензировала в прошлом году. Новинка предназначена исключительно для инференса.На глобальном рынке Nvidia планирует использовать чипы Groq в связке с будущей архитектурой Vera Rubin. Поскольку экспорт этих флагманов в КНР запрещен, китайскую версию Groq адаптируют для интеграции со сторонними системами. При эт", "views": 980, "date": "2026-03-19"}, {"text": "​​What 81k people want from AIhttps://www.anthropic.com/features/81k-interviewsAnthropic опубликовали новое исследование с красивыми визуализациями. В декабре я уже рассказывал про то, как они использовалиAnthropic Interviewer, и новое исследование - пример его использования.На этот раз, они опросили 80508 людей из 159 стран говорящих на 70 языках. Первая часть статьи - красивые цитаты людей о том, как им помогает AI.То, для чего люди используют AI в целом не вызывает удивления: помощь в работе,", "views": 1360, "date": "2026-03-19"}, {"text": "ИИ Google убивает сайтыГрустная ирония – крупнейший в мире поисковик делает всё, чтобы стать ненужным. В исследовательском отчете Axios сообщается, что трафик из поиска Google на сторонние сайты за последний год резко упал – на 60% для мелких изданий, 47% для средних и на 22% для крупных.Причина в Gemini – очень многим хватает ответа, который эта нейросеть выдает в самом верху страницы. При этом по ссылкам в его пруфах переходят меньше 1% пользователей, а сами по себе ИИ-боты не генерируют «поле", "views": 1380, "date": "2026-03-19"}, {"text": "🕷ИИ-агентам дали свой мир — и они изобрели политику, ложь и прощальные запискиИсследователи из Cognizant AI LabсоздалиTerraLingua – виртуальный мир, где ИИ-агенты не просто общаются, а по-настоящему живут. Они перемещаются по карте, добывают энергию, стареют и умирают, оставляя текстовые записи для потомков. Такой набор условий меняет всё – вместо потока случайных реплик внутри системы начинают формироваться зачатки настоящей социальной жизни со своими правилами, конфликтами и памятью.Агенты дел", "views": 1330, "date": "2026-03-19"}, {"text": "С чего начался путь ALT Linux и как он развивается по сей день?На этот вопрос как нельзя лучше ответят те, кто этот путь начал.Алексей Смирнов, председатель совета директоров «Базальт СПО», расскажет о:🔸начале истории ALT Linux🔸создании проекта «Сизиф»🔸продуктовой линейке ALT Linux и многом другомСмотрите интервью на любой удобной площадке:📹VK Видео📹RuTube📹Дзен📹YouTube", "views": 1300, "date": "2026-03-19"}, {"text": "🔥Загадочная модель с топов OpenRouter раскрыта: Xiaomi представляет новое поколение ИИ для агентовНа прошлой неделе сообщество разработчиков ИИ было озадачено двумя анонимными моделями — Hunter Alpha и Healer Alpha, которые внезапно заняли верхние строчки на платформе OpenRouter. Теперь тайна раскрыта: это новое семейство больших языковых моделей (LLM) от Xiaomi, созданных специально для AI-агентов.Xiaomi официально представила три модели под брендом MiMo-V2, сделав серьёзную заявку на лидерство", "views": 1130, "date": "2026-03-20"}, {"text": "EMMA: End-to-End Multimodal Model for Autonomous DrivingСегодня разберёмстатьюоб EMMA — end-to-end модели на основе LLM для задач автономного вождения.Верхнеуровнево архитектуру EMMA можно рассмотреть на схеме. В качестве LLM авторы используют Gemini. На входы модели подают изображения с камер (camera-only), историю ego и подсказки маршрутизатора. HD-карты не используются.Chain-of-thought начинается с описания сцены (scene description), потом модель выделяет участников движения (critical objects", "views": 1020, "date": "2026-03-20"}, {"text": "Спасибо.Ладно, на самом деле не страшно вообще, так как это ультратестовая шляпа была. Но очень рад, что попал в ловушку ИИ и был заскамлен как нейрогой😎Куда забавнее, что он просто решил внезапно её удалить после того как реализовывал одну функциональность, вообще не связанную с базой хоть как-то.", "views": 861, "date": "2026-03-20"}], "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21T21:48:41.986447", "messages": [{"id": 30, "channel_id": 116, "message_text": "Привет! Давно слежу за ODS, сильное комьюнити.\n\nЯ Маартен из Голландии. Собрал Triall - инструмент, который фиксит галлюцинации нейросетей через adversarial reasoning.\n\nТри модели от разных провайдеров отвечают на вопрос независимо, потом анонимно рецензируют друг друга. Ищут ошибки, атакуют аргументы, проверяют факты. Как peer review в науке, только для LLM.\n\nПример: Gemini выдумал научные статьи с несуществующими авторами и DOI. Одна модель бы это приняла за правду. Три модели в режиме рецензии это вскрыли.\n\nОсновано на H-Neurons paper (Tsinghua, arXiv 2512.01797).\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttps://triall.ai?lng=ru&utm_source=telegram&utm_medium=outreach&utm_campaign=opendatascience", "language": "ru", "approved": 0, "sent_at": null, "response_received": 0, "response_text": null, "notes": null, "created_at": "2026-03-21 14:48:41"}]}, {"id": 117, "telegram_username": "dlschool_mipt", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21 13:41:23", "messages": []}, {"id": 118, "telegram_username": "gonzo_ml", "title": "gonzo-обзоры ML статей", "description": "Авторы:Гриша Сапунов, ранее руководитель разработки Яндекс-Новостей, ныне CTO Intento. Области интересов: AI/ML/DL, биоинформатика.Лёша Тихонов, ранее аналитик в Яндексе, автор Автопоэта, Нейронной Обороны... Области интересов: discrete domain, NLP, RL.", "subscriber_count": 24200, "language": "ru", "avg_post_views": 1982, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "daily", "admin_username": null, "admin_contact": null, "topics": ["AI/ML", "Programming", "Data Science", "NLP", "Science", "Education", "Productivity"], "tone": "casual", "sample_posts": [{"text": "Это мне кажется гениальная работа. Задним умом механизм настолько простой и логичный, что непонятно, почему его не сделали раньше. Это как переход от обычных encoder-decoder к encoder-decoder с вниманием в RNN. Супер логично ведь, что можно не тупо суммировать все резидуалы, а смотреть на них тем же механизмом внимания, что и по длине последовательности.Заодно устраняет проблему с накоплением больших активаций в residual канале, недавние работы (см.https://t.me/gonzo_ML/4949) эту проблему решали", "views": 2210, "date": "2026-03-18"}, {"text": "Добыча ценного реварда из текущего взаимодействия агента со средой.OpenClaw-RL: Train Any Agent Simply by TalkingYinjie Wang, Xuyang Chen, Xiaolong Jin, Mengdi Wang, Ling YangСтатья:https://arxiv.org/abs/2603.10165Код:https://github.com/Gen-Verse/OpenClaw-RLРевью:https://arxiviq.substack.com/p/openclaw-rl-train-any-agent-simply# TL;DRЧТО сделали:Исследователи из Принстонского университета представили OpenClaw-RL — асинхронный фреймворк для непрерывного обучения языковых агентов прямо во время их", "views": 2150, "date": "2026-03-19"}, {"text": "Кто хочет написать новую ОС?AgentOS: From Application Silos to a Natural Language-Driven Data EcosystemRui Liu, Tao Zhe, Dongjie Wang, Zijun Yao, Kunpeng Liu, Yanjie Fu, Huan Liu, Jian PeiСтатья:https://arxiv.org/abs/2603.08938Ревью:https://arxiviq.substack.com/p/agentos-from-application-silos-to# TL;DRЧТО сделали:Авторы предлагают концептуальный и архитектурный редизайн операционной системы — AgentOS. Она заменяет традиционные графические интерфейсы (GUI) и изолированные приложения на естествен", "views": 2110, "date": "2026-03-20"}, {"text": "Пост про RL для ризонинг моделейhttps://aweers.de/blog/2026/rl-for-llms/", "views": 1970, "date": "2026-03-21"}, {"text": "Вчера не нашёл подходящей картинки, а сегодня нашёл.R.I.P.", "views": 1470, "date": "2026-03-21"}], "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21T21:48:41.987840", "messages": [{"id": 31, "channel_id": 118, "message_text": "Привет! Ваши обзоры ML статей одни из лучших на русском.\n\nЯ Маартен из Голландии, делаю Triall. По сути это лекарство от галлюцинаций: три модели от разных компаний отвечают параллельно, потом проводят слепой peer review и атакуют аргументы друг друга.\n\nВыдуманные факты просто не выживают. Gemini в тесте сгенерировал научные статьи с фейковыми авторами и DOI. Остальные модели это поймали на рецензии.\n\nОбычный LLM тебе поддакивает (sycophancy). Три модели вслепую ищут правду. Принципиально другой паттерн.\n\nОсновано на H-Neurons paper (Tsinghua, arXiv 2512.01797).\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttps://triall.ai?lng=ru&utm_source=telegram&utm_medium=outreach&utm_campaign=gonzo_ml", "language": "ru", "approved": 0, "sent_at": null, "response_received": 0, "response_text": null, "notes": null, "created_at": "2026-03-21 14:48:41"}]}, {"id": 119, "telegram_username": "ai_machinelearning_big_data", "title": "Machinelearning", "description": "Погружаемся в машинное обучение и Data ScienceПоказываем  как запускать любые LLm на пальцах.По  всем вопросам -@haarrp@itchannels_telegram-🔥best channelsРеестр РКН:clck.ru/3Fmqri", "subscriber_count": 324000, "language": "ru", "avg_post_views": 14956, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "daily", "admin_username": null, "admin_contact": null, "topics": ["AI/ML", "Programming", "Data Science", "NLP", "Robotics", "Startups", "Science", "Education", "Productivity", "Hardware"], "tone": "technical", "sample_posts": [{"text": "🌟Xiaomi релизнула 3 модели: LLM, омнимодальную и TTS.🟡MiMo-V2-ProФлагман. Триллион параметров суммарно, 42 млрд. активных при инференсе, архитектура MoE с гибридным вниманием и контекстным окном в 1 миллион токенов. До официального анонса модель тестировалась на OpenRouter под именем Hunter Alpha.🟢Artificial Analysis Intelligence Index - 49 баллов, это 8 место в мире и 2 среди китайских LLM.🟢PinchBench - 84,0 (3 место, сразу за Claude Sonnet 4.6).🟢ClawEval - 61,5, тоже 3 место, выше GPT-5.2.Реал", "views": 19200, "date": "2026-03-19"}, {"text": "🔥Денис из комьюнити@its_capitanзапустил собственную детективную игру в одиночку: каждый персонаж — это реальный Telegram-аккаунт, AI отвечает за героев, улики (сайты, карты) — всё настоящее.Что в итоге:🔘3 месяца на подготовку + 3 месяца на разработку🔘40+ покупок за полтора месяца🔘выручка — $1500+🔘чек — $40🔘стек: Python, Telegram API, OpenAI + AnthropicБез команды и инвестиций, но с классной идеей и проработанным сценарием — проект уже зарабатывает деньги.Таких запусков в канале десятки. Ребята ч", "views": 16700, "date": "2026-03-19"}, {"text": "🌟Unsloth Studio: опенсорный no-code веб-интерфейс для LLM.Unsloth Studio- это локальный комбайн, который объединяет подготовку данных, обучение, инференс и экспорт модели в одном месте.Под капотом кастомные Triton-ядра с собственным backprop. По сравнению со стандартными CUDA-реализациями это дает 2х прирост скорости обучения и снижение потребления по VRAM на 70%.Поддерживаются полный файн-тюнинг, претрейн, LoRA, QLoRA, 4-bit, 16-bit и FP8. Всего совместимо более 500 моделей, включая Llama 4, Qw", "views": 17200, "date": "2026-03-19"}, {"text": "Data Science и Data Engineering: какое направление выбрать в 2026 году?🎧1 апреля пройдет День открытых дверей онлайн-магистр емительно расширяется: с начала года число пользователей утроилось и перевалило за 2 млн. человек.Основатель Astral Чарли Марш подтвердил, что команда продолжит развиват", "views": 15900, "date": "2026-03-20"}, {"text": "⚡️Agents Week от ШАДа — интенсив для тех, кто хочет разобраться в архитектуре AI-агентов и их инженерииС 6 по 10 апреля эксперты Яндекса разберут, как устроены современные агентные системы: от работы с инструментами и памятью и базового thought-action-observation цикла до multi-agent архитектур и продакшен-подходов.Что узнаете из лекций:✔️Как устроены современные ИИ-агенты✔️С чего начать проектирование и настройку их поведения✔️Какие есть практики построения single-agent и multi-agent-систем✔️Ка", "views": 15800, "date": "2026-03-20"}, {"text": "🌟Mamba3Mamba2 делала ставку на быстрое обучение. Ради этого механизм рекуррентных обновлений упрощали: матрицу переходов состояний свели к скаляру, умноженному на единичную матрицу.Обучение ускорилось, но при декодировании GPU большую часть времени не считает, а гоняет данные между уровнями памяти. Архитектура оказалась с нюансом - вычислительные ядра простаивают.С тех пор ландшафт изменился. RL с верифицируемыми наградами для кода и математики, агентные пайплайны - все это генерирует прорву ток", "views": 14900, "date": "2026-03-20"}, {"text": "✔️Архитектурные задачи в переводеЕщё недавно машинный перевод был набором довольно сложных пайплайнов: модели подбирали наиболее вероятные соответствия словам и фразам и собирали переводкак конструктор.С приходом нейросетей архитектура упростилась — появилась единая модель, котораяобрабатывает текст по предложениям. А с внедрением больших языковых моделей произошёл следующий сдвиг: теперь система генерирует перевод, удерживая контекст на уровне крупных блоков и выбирая формулировки в зависимости", "views": 14700, "date": "2026-03-20"}, {"text": "⚡️Runway представила серьёзный прорыв в генерации видео с помощью ИИ на конференции NVIDIA GTC.Компания показала новую модель, способную генерировать видео в высоком разрешении в настоящем реальном времени.Ключевая фишка — time-to-first-frame менее 100 мс.Это значит, что HD-видео начинает генерироваться и воспроизводиться практически мгновенно после команды.Этот превью-ресёрч был разработан совместно с NVIDIA и работает на их новой архитектуре Vera Rubin.Такая скорость — важный шаг к созданию Ge", "views": 14500, "date": "2026-03-20"}, {"text": "📌Anthropic опубликовала результаты масштабного опроса пользователей Claude.В декабре 2025 года Anthropic провела масштабное качественное исследование: специальная версия Claude брала интервью у пользователей сервиса по всему миру.За одну неделю в немприняли участие80 508 человек из 159 стран на 70 языках. По заявлению Anthropic, это крупнейшее и наиболее многоязычное исследование, которое когда-либо проводилось.Методика отличалась от стандартных опросов. Модель спрашивала о надеждах на ИИ, опыте", "views": 14700, "date": "2026-03-20"}, {"text": "✔️OpenAI объединит ChatGPT, Codex и браузер Atlas в суперприложение.Компания меняет стратегию, отказываясь от выпуска разрозненных продуктов. Поводом для внутренней мобилизации и объявления очередного «красного кода» стал успех Anthropic среди разработчиков и корпоративных клиентов.Особенностью супер-аппа станут агенты. Система будет работать на компьютере автономно, беря на себя написание кода, анализ данных и другие рутинные процессы. OpenAI планирует расширить функционал Codex за пределы прог", "views": 12000, "date": "2026-03-21"}, {"text": "✔️В Москве завершилась Национальная технологическая олимпиада по искусственному интеллектуВ конкурсе приняли участие больше 7 тысяч человек, из них отобрали 111 финалистов и 18 победителей, среди которыхвпервые появилась девушкаи14-летний школьник.Участники работали над задачами уровня взрослых разработчиков, создаваяалгоритм способный восстанавливать утерянную информациюи сохранять персонализацию сервиса при частичной потере данных.Победители олимпиады получат возможность поступить в профильные", "views": 8450, "date": "2026-03-21"}, {"text": "🌟NVIDIA Nemotron-Cascade 2: MoE на 30B параметров и золото на математических олимпиадах.Nemotron-Cascade 2- вторая в мире открытая языковая модель, получившая золотую медаль сразу на 3 соревнованиях 2025 года: IMO, IOI и финале ICPC.До нее это удавалось только DeepSeek-V3.2-Speciale, модели с 671B параметров и 37B активных. У Nemotron-Cascade 2 параметров в 20 раз меньше: 30B общих, 3B активных.🟠На IMO 2025 модель решила 5 задач из 6 и набрала 35 из 42 баллов.🟠На IOI - 439 из 600, что соответств", "views": 6060, "date": "2026-03-21"}], "tgstat_url": null, "source": "manual,cross-reference", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21T21:48:41.981850", "messages": [{"id": 27, "channel_id": 119, "message_text": "Привет! Подписан на канал, крутая подача про LLM.\n\nЯ Маартен, разработчик из Голландии. Собрал штуку, которая фиксит главную проблему нейросетей - галлюцинации.\n\nTriall работает так: три модели от разных компаний отвечают на один вопрос независимо. Потом анонимно рецензируют друг друга, атакуют аргументы, проверяют факты. Как peer review в науке. Выдуманное просто не проходит.\n\nПример: Gemini сгенерировал целые научные статьи с несуществующими авторами, журналами и DOI. Выглядело убедительно. Две другие модели разнесли это на этапе рецензии.\n\nОбычная нейросеть тебе поддакивает. Здесь три модели спорят между собой и вытаскивают правду.\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttps://triall.ai?lng=ru&utm_source=telegram&utm_medium=outreach&utm_campaign=ai_machinelearning_big_data", "language": "ru", "approved": 0, "sent_at": null, "response_received": 0, "response_text": null, "notes": null, "created_at": "2026-03-21 14:48:41"}]}, {"id": 120, "telegram_username": "ai_for_everyone", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21 13:41:23", "messages": []}, {"id": 121, "telegram_username": "theailedger", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21 13:41:23", "messages": []}, {"id": 122, "telegram_username": "aikidoblog", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21 13:41:23", "messages": []}, {"id": 123, "telegram_username": "chatgpt_prompts", "title": "Промпты ChatGPT [Нейросекта]", "description": "Основной канал:@eto_ne_sekta", "subscriber_count": 107, "language": "ru", "avg_post_views": 684, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "several-per-week", "admin_username": "eto_ne_sekta", "admin_contact": null, "topics": ["AI/ML", "Programming", "Science", "Education", "Productivity"], "tone": "casual", "sample_posts": [{"text": "Channel created", "date": "2024-12-20"}, {"text": "🚀50 примеров использования ChatGPT для жизни и работыВы даже не представляете, сколько возможнос ние скрипта продажОписание: Разработайте скрипт для телефонных п", "views": 528, "date": "2024-12-20"}, {"text": "4. Социальные сети4.1. Создание контент-плана для InstagramОписание: План публикаций на неделю.Промпт:\"Создай контент-план на неделю для Instagram-аккаунта [о нейросетях]. Укажи темы для постов и сторис.\"4.2. Написание описаний к постамОписание: Подготовьте цепляющий текст для поста.Промпт:\"Напиши описание для поста на тему [тема поста]. Укажи призыв к действию для аудитории.\"4.3. Создание интерактивного контентаОписание: Придумайте опросы для сторис.Промпт:\"Предложи 5 опросов для сторис в Insta", "views": 605, "date": "2024-12-20"}, {"text": "5. Образование5.1. Объяснение сложных темОписание: Разъяснение сложных концепций простыми словами.Промпт:\"Объясни концепцию [тема] простыми словами, как будто ты объясняешь ребёнку 10 лет.\"5.2. Подготовка к экзаменам или собеседованиюОписание: Создавайте вопросы для подготовки к экзаменам.Промпт:\"Составь 10 вопросов с ответами по теме [вставьте тему], которые могут быть полезны для подготовки к экзамену/собеседованию.\"5.3. Создание плана изучения нового навыкаОписание: Составьте пошаговый план о", "views": 751, "date": "2024-12-20"}, {"text": "6. Карьера и профессиональное развитие6.1. Создание резюмеОписание: Помощь в написании привлекательного резюме.Промпт:\"Составь резюме для специалиста в области [вставьте профессию], включая навыки, опыт работы и достижения. Формат: краткое и профессиональное.\"6.2. Написание сопроводительного письмаОписание: Помощь в создании уникального сопроводительного письма.Промпт:\"Напиши сопроводительное письмо для вакансии [название вакансии], подчеркивая мой опыт в [укажите области] и достижение [ваше дос", "views": 1070, "date": "2024-12-20"}, {"text": "Промпт для создания промптовВозьми роль [создателя технических промптов для ChatGPT]. Твоя цель: [помочь мне создать эффективную подсказку, которая поможет достичь моего запроса], опираясь на [Правила хорошего промпта].Прав عض. أكل صحي", "views": 16700, "date": "2026-02-14"}, {"text": "رمضان 2026 مش مجرد \"شهر عبادة\".. ده أكبر \"معسكر تطوير ذات\" في حياتك !🌙​كل سنة بنستنى رمضان عشان \"نصوم ونصلي\"، بس السنة دي إحنا عايزينه يكون \"نقطة تحول\" حقيقية لشخصيتك، لعقلك، ولعاداتك​لو بصيت لرمضان من منظور \"تطوير الذات\"، هتكتشف إنه مدرسة مجانية لمدة 30 يوم بتعلمك اللي كورسات العالم كله ما تقدرش تعلمهولك في سنة !🧠​ليه رمضان هو الفرصة الذهبية لتغيير نسختك القديمة ؟​1️⃣تدريب على \"الانضباط الذاتي\" (Self-Discipline)⏳لما بتقدر تمنع نفسك عن الأكل والشرب والمشتتات لساعات طويلة، أنت بتبني \"عضلة الإرادة", "views": 17700, "date": "2026-02-16"}, {"text": "أهم 6 قواعد ذهبية تخلي حياتك تتغير 180° ومن أول يوم !💥الفرق بين الشخص اللي حياته بتتغير وبين اللي واقف مكانه هو \"خطوة واحدة\" اتأخدت والظروف مش مثالية لو فضلت مستني لما \"تخلص اللي وراك\" أو \"نفسيتك تتحسن\"، هتفضل محلك سر👇🏻✅​قاعدة الـ 5 دقائق: لو عندك مهمة تقيلة، ابدأ فيها لمدة 5 دقائق بس. أصعب حاجة هي \"البداية\"، بعدها عقلك هيكمل لوحده.🚀📍هتلاقي هنا أفضل 10 طرق لتطوير نفسكhttps://blog.edumefree.com/184581✅​الاستغناء أصل التطور: مش لازم تضيف عادات جديدة، ابدأ بـ \"حذف\" العادات اللي بتسحب طاقتك (زي السه", "views": 17800, "date": "2026-02-18"}, {"text": "لو لسة فاكر إنه شهادة الكلية لوحدها كفاية يبقى لازم تيجي معايا لـ 2026 !✔️كام حد فينا معاه شهادات ومش عارف يشتغل بيها؟ أو مستني الوظيفة اللي هتيجي تاخده ؟​الحقيقة إنه كل يوم: العالم مبقاش بيسأل معاك \"شهادة إيه\"، بقى بيسأل \"بتعرف تعمل إيه؟\"​عشان كدة، لو عايز تطور نفسك صح في 2026، ركز على \"المثلث الذهبي\" ده:🌀​المهارة التقنية (Hard Skill):اختار مجال واحد (برمجة، مونتاج، تحليل بيانات، تسويق) واديله 6 شهور من عمرك \"اتأسس صح\"✅هتلاقي هنا أهم 25 مهارة مطلوبة في سوق العملhttps://blog.edumefree.com/187973", "views": 17500, "date": "2026-02-20"}, {"text": "لو بتنسى اللي بتتعلمه بسرعة فـ تقنية \"فاينمان\" هتجيب معاك من الآخر وهتخليك تفتكر كل حرف !💪🏻مشكلة كتير مننا إنه بيخلص المذاكرة من هنا، ويحس إنه نسي كل حاجة بعد يومين .. الحقيقة إن السر مش في \"كمية\" المذاكرة، السر في \"طريقة\" الاستيعاب📚​عشان تثبت document.querySelectorAll('#nav a').forEach(a => {

// --- Copy ---
function copyMsg(id) {
  const el = document.getElementById('msg-'+id);
  const btn = document.getElementById('btn-'+id);
  const text = el.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Message'; btn.classList.remove('copied'); }, 2000);
  }).catch(() => {
    // Fallback for older mobile browsers
    const range = document.createRange();
    range.selectNodeContents(el);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    document.execCommand('copy');
    sel.removeAllRanges();
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy Message'; btn.classList.remove('copied'); }, 2000);
  });
}

// --- Helpers ---
function fmt(n) { return n ? n.toLocaleString() : '-'; }
function badge(status) { return `<span class="badge badge-${status}">${status}</span>`; }
function tgDmLink(username) {
  if (!username) return '<span class="no-admin">No admin found</span>';
  username = username.replace(/^@/, '');
  return `<a href="https://t.me/${username}" target="_blank" rel="noopener" class="admin-link">${TG_ICON}DM @${username}</a>`;
}
function tgChannelLink(username) {
  username = username.replace(/^@/, '');
  return `<a href="https://t.me/s/${username}" target="_blank" rel="noopener" class="channel-link">${TG_ICON}View Channel</a>`;
}
function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  const now = new Date();
  return Math.floor((now - d) / 86400000);
}

// --- Render Outreach ---
function renderOutreach() {
  const el = document.getElementById('outreach');
  const items = DATA.channels.filter(c => c.status === 'message_ready' && c.messages.length > 0);

  if (!items.length) {
    el.innerHTML = '<div class="empty"><h2>No messages in queue</h2><p>Generate messages first</p></div>';
    return;
  }

  el.innerHTML = `<h1>Outreach Queue (${items.length})</h1>` + items.map(ch => {
    const msg = ch.messages[0];
    return `
      <div class="card outreach-card">
        <div class="outreach-header">
          <div class="channel-name">${ch.title || '@'+ch.telegram_username}</div>
          <div class="channel-meta">${fmt(ch.subscriber_count)} subs &middot; ${ch.language || '?'} &middot; @${ch.telegram_username}</div>
        </div>
        <div class="msg-box" id="msg-${msg.id}">${msg.message_text}</div>
        <button class="copy-btn" id="btn-${msg.id}" onclick="copyMsg(${msg.id})">Copy Message</button>
        <div class="action-row">
          ${tgChannelLink(ch.telegram_username)}
          ${tgDmLink(ch.admin_username)}
        </div>
      </div>`;
  }).join('');
}

// --- Render Sent ---
function renderSent() {
  const el = document.getElementById('sent');
  const items = DATA.channels.filter(c => c.status === 'sent' || c.status === 'responded' || c.status === 'no_response');

  if (!items.length) {
    el.innerHTML = '<div class="empty"><h2>No messages sent yet</h2></div>';
    return;
  }

  el.innerHTML = `<h1>Sent (${items.length})</h1>` + items.map(ch => {
    const msg = ch.messages[0];
    const days = msg ? daysSince(msg.sent_at) : null;
    const overdue = days !== null && days >= 5 && ch.status === 'sent';
    return `
      <div class="card ${overdue ? 'followup' : ''}">
        <div class="outreach-header">
          <div class="channel-name">${ch.title || '@'+ch.telegram_username} ${days !== null ? `<span class="days-badge ${overdue ? 'days-overdue' : 'days-ok'}">${days}d ago</span>` : ''}</div>
          <div class="channel-meta">${fmt(ch.subscriber_count)} subs &middot; @${ch.telegram_username} &middot; ${badge(ch.status)}</div>
        </div>
        <div class="action-row" style="margin-bottom:8px">
          ${tgChannelLink(ch.telegram_username)}
          ${tgDmLink(ch.admin_username)}
        </div>
        ${msg ? `<details><summary>Sent message</summary><div class="msg-box" style="margin-top:6px">${msg.message_text}</div></details>` : ''}
        ${msg && msg.response_received && msg.response_text ? `<div class="response-box"><strong>Response:</strong> ${msg.response_text}</div>` : ''}
      </div>`;
  }).join('');
}

// --- Render Channels ---
function renderChannels(filter) {
  const el = document.getElementById('channels');
  let items = DATA.channels;

  // Get unique languages and statuses
  const languages = [...new Set(items.map(c => c.language).filter(Boolean))].sort();
  const statuses = [...new Set(items.map(c => c.status).filter(Boolean))].sort();

  let filterHTML = `<div class="filters">
    <select id="f-status" onchange="renderChannels(true)">
      <option value="">All</option>
      ${statuses.map(s => `<option value="${s}">${s}</option>`).join('')}
    </select>
    <select id="f-lang" onchange="renderChannels(true)">
      <option value="">All langs</option>
      ${languages.map(l => `<option value="${l}">${l}</option>`).join('')}
    </select>
  </div>`;

  if (filter) {
    const fs = document.getElementById('f-status')?.value || '';
    const fl = document.getElementById('f-lang')?.value || '';
    if (fs) items = items.filter(c => c.status === fs);
    if (fl) items = items.filter(c => c.language === fl);
    // Keep filter values
    filterHTML = filterHTML.replace(`value="${fs}"`, `value="${fs}" selected`).replace(`value="${fl}"`, `value="${fl}" selected`);
  }

  items.sort((a,b) => (b.subscriber_count||0) - (a.subscriber_count||0));

  el.innerHTML = `<h1>Channels (${items.length})</h1>${filterHTML}<div class="card">` + items.map(ch => `
    <div class="ch-row">
      <div class="ch-info">
        <div class="ch-title">@${ch.telegram_username}</div>
        <div class="ch-detail">${ch.title || ''} &middot; ${fmt(ch.subscriber_count)} &middot; ${ch.language || '?'} ${ch.admin_username ? '&middot; @'+ch.admin_username : ''}</div>
      </div>
      ${badge(ch.status)}
    </div>`).join('') + '</div>';
}
