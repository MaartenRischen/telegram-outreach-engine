<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TG Outreach</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#111;--card:#1a1a2e;--input:#0f3460;--text:#e6e6e6;--muted:#8a8a9a;
  --accent:#e94560;--accent2:#ff6b81;--success:#2ecc71;--warn:#f39c12;--border:#2a2a4a;--r:10px;
}
body { font-family:-apple-system,system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; min-height:100dvh; padding-bottom:72px; }
nav { position:sticky;top:0;z-index:100;background:var(--card);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:0; }
nav a { flex-shrink:0;padding:14px 16px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:600;white-space:nowrap;border-bottom:2px solid transparent; }
nav a.active { color:var(--accent);border-bottom-color:var(--accent); }
.page { display:none;padding:12px; }
.page.active { display:block; }
.card { background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:10px; }
.stats-row { display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px; }
.stat { background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px;text-align:center; }
.stat .n { font-size:1.8rem;font-weight:700;color:var(--accent); }
.stat .l { font-size:0.75rem;color:var(--muted);margin-top:2px; }
h1 { font-size:1.3rem;margin-bottom:10px; }
h2 { font-size:1.1rem;margin-bottom:8px; }

/* Outreach card */
.outreach-card { margin-bottom:14px; }
.outreach-header { margin-bottom:10px; }
.channel-name { font-weight:700;font-size:1rem; }
.channel-name a { color:var(--text);text-decoration:none; }
.channel-meta { font-size:0.8rem;color:var(--muted);margin-top:2px; }
.action-row { display:flex;gap:8px;margin-top:10px; }
.action-row a { flex:1;text-align:center; }
.channel-link {
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--input);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--r);
  text-decoration:none;font-size:0.85rem;font-weight:600;white-space:nowrap;
  min-height:44px;
}
.channel-link:active { background:var(--border); }
.admin-link {
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  background:var(--accent);color:#fff;padding:10px 14px;border-radius:var(--r);
  text-decoration:none;font-size:0.85rem;font-weight:600;white-space:nowrap;
  min-height:44px;
}
.admin-link:active { background:var(--accent2); }
.admin-link svg, .channel-link svg { width:18px;height:18px;fill:currentColor;flex-shrink:0; }
.no-admin { display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--border);color:var(--muted);padding:10px 14px;border-radius:var(--r);font-size:0.85rem;font-weight:600;min-height:44px;flex:1;text-align:center; }
.msg-box {
  background:var(--input);border:1px solid var(--border);border-radius:var(--r);
  padding:12px;white-space:pre-wrap;font-size:0.9rem;line-height:1.5;
  position:relative;user-select:text;-webkit-user-select:text;
  word-break:break-word;
}
.copy-btn {
  display:block;width:100%;margin-top:8px;padding:12px;
  background:var(--success);color:#fff;border:none;border-radius:var(--r);
  font-size:0.95rem;font-weight:600;cursor:pointer;min-height:48px;
}
.copy-btn:active { background:#27ae60; }
.copy-btn.copied { background:var(--accent); }

/* Channel list */
.ch-row { padding:10px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px; }
.ch-row:last-child { border-bottom:none; }
.ch-info { flex:1;min-width:0; }
.ch-title { font-weight:600;font-size:0.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.ch-detail { font-size:0.78rem;color:var(--muted); }
.badge {
  display:inline-block;padding:3px 8px;border-radius:10px;font-size:0.7rem;font-weight:600;white-space:nowrap;flex-shrink:0;
}
.badge-discovered { background:#222;color:var(--muted); }
.badge-scraped { background:#1a3a5c;color:#5dade2; }
.badge-message_ready { background:#1a3c1a;color:var(--success); }
.badge-sent { background:#3c3a1a;color:var(--warn); }
.badge-responded { background:#1a3c2a;color:#2ecc71; }
.badge-no_response { background:#2a2a2a;color:#888; }

/* Sent tracking */
.followup { border-left:3px solid var(--warn);padding-left:10px; }
.days-badge { font-size:0.75rem;padding:2px 6px;border-radius:8px;font-weight:600; }
.days-overdue { background:rgba(243,156,18,0.2);color:var(--warn); }
.days-ok { background:rgba(46,204,113,0.1);color:var(--success); }
.response-box { background:rgba(46,204,113,0.1);border:1px solid var(--success);border-radius:var(--r);padding:10px;margin-top:8px;font-size:0.85rem; }

/* Funnel */
.funnel { display:flex;align-items:center;gap:4px;overflow-x:auto;margin-bottom:12px;padding-bottom:4px; }
.funnel-step { text-align:center;padding:8px 10px;border-radius:var(--r);background:var(--card);border:1px solid var(--border);flex-shrink:0;min-width:70px; }
.funnel-step .fc { font-size:1.3rem;font-weight:700;color:var(--accent); }
.funnel-step .fl { font-size:0.65rem;color:var(--muted);text-transform:uppercase; }
.funnel-arr { color:var(--muted);font-size:1rem; }

/* Filters */
.filters { display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap; }
.filters select { background:var(--input);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:var(--r);font-size:0.85rem;min-height:40px; }

/* Details expand */
details { margin-top:8px; }
details summary { color:var(--accent);font-size:0.82rem;cursor:pointer;padding:4px 0; }
details .post-snippet { background:var(--bg);border-radius:var(--r);padding:8px;margin:4px 0;font-size:0.8rem;line-height:1.4; }

/* Empty state */
.empty { text-align:center;padding:40px 20px;color:var(--muted); }

@media(min-width:600px) {
  body { max-width:800px;margin:0 auto; }
  .stats-row { grid-template-columns:repeat(4,1fr); }
}
</style>
</head>

сразу вместе с аудиобез дополн", "views": 6270, "date": "2026-03-11"}, {"text": "⚡️Языки программирования и время, которое потребовалось для выпуска первой версии.Многие думают, что язык программирования можно сделать быстро. Но на практике на это уходят годы. Rust разрабатывали девять лет, Kotlin и C++ около шести, Go и Java примерно пять. Даже Python готовили два года перед первым релизом.Есть знаменитое исключение - JavaScript. Его написали всего за десять дней в 1995 году, и многие странности языка до сих пор связаны именно с такой скоростью разработки.Это хороший пример", "views": 5200, "date": "2026-03-12"}, {"text": "🐍Python полезные ресурсы🚀Max@pythonl", "views": 4560, "date": "2026-03-13"}, {"text": "🐍Почему ошибки валидации в Python иногда так сложно найтиЧем глубже вложена структура данных, тем сложнее понять,где именно произошла ошибка.Если использовать обычные dataclass, вы чаще всего увидите только значение, которое не прошло проверку — но не путь к полю, где возникла проблема.В сложных вложенных структурах это превращает отладку в настоящую боль.Pydantic решает эту проблему.Он показываетполный путь до поля, которое вызвало ошибку — от корневой модели до конкретного атрибута.В результат", "views": 4000, "date": "2026-03-14"}, {"text": "🖥ByteDance только что выпустили в открытый доступ -OpenViking, и этот проект показывает, что именно не так с тем, как сегодня строят память для AI-агентов.Вот где большинство агент-фреймворков ошибаются:Память хранится в одном месте.Ресурсы — в другом.Навыки разбросаны по системе.Когда агенту нужен контекст, обычно делаютплоский векторный поиски просто надеются на лучший результат.Именно это и проблема.OpenViking решает её одной идеей:рассматривать контекст агентакак файловую систему.Всё работае", "views": 3940, "date": "2026-03-15"}, {"text": "Нужны твои навыки в работе с ИИ на МТС True Tech Hack 2026!Тебе сюда, если ты инженер данных, разработчик или системный аналитик.1 500 000 рублей— общий призовой фонд ИТ-соревнова iews": 2029, "date": "2026-03-19"}, {"text": "⚠️Отчёты выглядят убедительно. Графики растут. Решения принимаются быстро. Но один вопрос может обрушить всю картину: насколько качественные ваши данные?Проблема плохих данных редко заметна сразу. Она проявляется позже — в сломанных маркетинговых акциях, ошибках кредитного скоринга, неверных управленческих решениях и потерянной прибыли.👨‍💻На открытом уроке 1 апреля в 20:00 МСК разберём, как на практике выявлять проблемы в данных и предотвращать их последствия. Вы узнаете, что такое Data Quality,", "views": 3170, "date": "2026-03-19"}, {"text": "⚡️Runway представила серьёзный прорыв в генерации видео с помощью ИИ на конференции NVIDIA GTC.Компания показала новую модель, способную генерировать видео в высоком разрешении в настоящем реальном времени.Ключевая фишка — time-to-first-frame менее 100 мс.Это значит, что HD-видео начинает генерироваться и воспроизводиться практически мгновенно после команды.Этот превью-ресёрч был разработан совместно с NVIDIA и работает на их новой архитектуре Vera Rubin.Такая скорость — важный шаг к созданию Ge", "views": 18600, "date": "2026-03-19"}, {"text": "Data Science и Data Engineering: какое направление выбрать в 2026 году?🎧1 апреля пройдет День открытых дверей онлайн-магистратуры НИЯУ МИФИ «Специалист по работе с данными и ИИ» в партнёрстве с Яндекс Практикумом.На встрече обсудят:💙как рост ИИ трансформируют рынок труда💙4 трека для развития: ML, CV, NLP и Data Engineering💙какие задачи усложняются и где усиливается конкуренцияИ расскажут, как за 2 года освоить фундаментальную базу, собрать портфолио из проектов и получить диплом магистра без отр", "views": 3440, "date": "2026-03-19"}, {"text": "А Вайбкодер может?", "views": 3490, "date": "2026-03-19"}, {"text": "Разбор рынка ПО: от структуры до методологийРынок ПО сегодня — это сочетание облачных решений, on-premise-инфраструктуры и быстро растущих сегментов вроде ИИ и ИБ. Это делает его сложнее не только для анализа, но и для интерпретаци у (раз,два,три), часто пользуюсь готовыми скилами, а какие-то пишу сам, но есть у них один фатальный недостаток, о котором, к моему большому удивлению, мало кто задумывается, эту проблему можно описать каккроссплатформенность компилируемых бинарных файлов.К примеру, у меня есть скил, который вызывает некий бинарник, скомпилированный под x86/64,", "views": 1500, "date": "2026-03-12"}, {"text": "OpenAPI to CLIэто врапер между API и консольюНе так давно япубликовалпроектopenapi-to-mcp, который позволяет любой API сервер с нормальной OpenAPI/Swagger спецификацией конвертировать в MCP сервер. Но теперь я развил эту идею в сторону консоли и сделалopenapi-to-cli, который по OpenAPI/Swagger спецификации генерит удобную CLI над тем же самым API.Как это работаетДопустим в спецификации API есть такие эндпоинты:- GET /messages- POST /messages- GET /status- GET /usersВ момент добавления профиляope", "views": 1630, "date": "2026-03-12"}, {"text": "Забудь про MCP и tools — конвертируй 100 000 API методов в один CLI инструмент на летуВсе сейчас пишут MCP-серверы и tools для агентовНа каждый API endpoint — отдельный tool с описанием, параметрами, схемой10 методов? Ок100? Уже больно845 (GitHub API)? Удачи (да да можно делать поиск и тулов и MCP) но какой же это зоопарк и как его поддерживать?Но так же мы поняли новый тренд это cli оберткиОт сюда мы с@evilfreelancerпошли другим путём: берём любой OpenAPI spec (JSON/YAML) и конвертируем его в C", "views": 1190, "date": "2026-03-13"}, {"text": "Приехала коробочка Beelink ME mini на 16гб RAM и процессором N150 с AliExpress, повезло урвать себе версию с 1Тб nvme на борту.", "views": 1840, "date": "2026-03-13"}, {"text": "Забудь про MCP и tools — конвертируй 100 000 API методов в один CLI инструмент на лету  Все сейчас пишут MCP-серверы и tools для агентов На каждый API endpoint — отдельный tool с описанием, параметрами, схемой 10 методов? Ок 100? Уже больно 845 (GitHub API)?…", "views": 7700, "date": "2026-03-13"}, {"text": "Забрал RTX 4090 из сервиса Vik-on после модификации до 48гб, солидно она схуднула конечно.#server", "views": 1610, "date": "2026-03-14"}, {"text": "Поставил в сервер, загрузил, ничего настраивать не пришлось, система подхватила карточку сама, штатный драйвер её увидел, даже vllm зарезервировала память под кеш.", "views": 1620, "date": "2026-03-14"}, {"text": "Феномен предвзятости подтверждения и... нейросетиСегодня предлагаю ещё один вопрос для рефлексии и философствования, на этот раз про одну из самых недооценённых проблем LLM, которая заключена не в галлюцинациях и даже не ошибках самих по себе, а в том как легко модели подыгрывают позиции пользователя.Когда человек изучает некую тему, например про бег, он может спросить модельку \"почему бег полезен\" и получить вполне убедительный текст про сердце, кардиовыносливость, настроение и метаболизм. Но е", "views": 1510, "date": "2026-03-16"}, {"text": "Openapi-to-cli«openapi-to-cli» (ocli) — CLI-утилита на TypeScript, которая превращает любое OpenAPI/Swagger API в набор CLI-команд в рантайме, без кодогенерации. По сравнению с MCP+Search подходом, ocli даёт в 15 раз более компактные результаты поискаСамый быстро растущий наш сПашейпроект за меньше чем 5 дней 100+ звезд400 + Clones2000 посещений репоЧто интересно в части рабочих чатиков видел обсуждение и тесты тулзы (и пока только положительные впечетления)РЕПО:https://github.com/EvilFreelancer", "views": 915, "date": "2026-03-17"}, {"text": "Pavel Zloipinned «Вокруг AGENTS.md и всяких \"универсальных\" файлов для агентов в последнее время как-то слишком много разговоров. Особенно забавно это выглядит на фоне того, что рядом уже начали появляться вполне трезвые наблюдения о том, что польза таких файлов слегка преувеличена.…»", "date": "2026-03-17"}, {"text": "SGR Agent Core0.7.0Кратенько и по порядку, в этом релизе:0️⃣В документацию добавили страницуHighlights.1️⃣В ядро доехал долгостройRunCommandTool, причём не просто \"запусти команду\", а с разделением на safe и unsafe режимы, workspace-настройками и нормальной обвязкой под выполнение команд.2️⃣ПереработалиWebSearchTool, теперь помимо Tavily есть ещё поддержка Brave и Perplexity.3️⃣Ещё одна важная фича - поддержка stateless контекста пользователя, для интеграций, где нельзя или неудобно тащить полно", "views": 872, "date": "2026-03-18"}, {"text": "Принял VibeCodeэстафетуот Рината@llm_under_hoodПопросил Cursor проанализировать все репозитории на диске в которые я коммитал хотя бы один раз, репозитории без .git индекса попросил игнорировать, полученный отчёт агент собрал в Markdown файл, после чего сгенерировал из него лендос по шаблону, получилась такая вот красота.На графике хорошо видно, что весь 2025 всё шло более менее как обычно, но в первом квартале этого года я начал уже вайбкодить по-взрослому, число уникальных репозиториев и колич", "views": 1270, "date": "2026-03-18"}, {"text": "Вайбкод для неискушенныхРешил провести на работе один небольшой эксперимент, предложил коллегам у которых нет айтишного образования попробовать нейросети и инструменты вайбкодинга при решении своих повседневных задач.Важное условие эксперимента в использовании self-hosted моделей и opensource агентов. Плюс поскольку участники эксперимента специализируются не на разработке, а на решении проблем бизнеса нужна модель которая пусть и не супер кодит, но зато имеет широкий кругозор.Поэтому мною были в", "views": 1130, "date": "2026-03-19"}, {"text": "Тысячу мы преодолели за почти три года, 21 января 2025. Тогда казалось, что до второй ещё кондёхать и кондёхать, но это произошло гораздо раньше, чем я ожидал. Спасибо всем, кто читает мои ворчания и следит за проектиками, ваши комментарии, внимание и конструктивная…", "views": 1060, "date": "2026-03-19"}, {"text": "Вайбкод для неискушенных  Решил провести на работе один небольшой эксперимент, предложил коллегам у которых нет айтишного образования попробовать нейросети и инструменты вайбкодинга при решении своих повседневных задач.  Важное условие эксперимента в использовании…", "views": 936, "date": "2026-03-20"}, {"text": "ACPBox- Agent Client Protocol (ACP) в формате OpenAI APIВ последнее время много занимаюсь интеграцией агентов и в какой-то момент устал каждый раз заново собирать ReAct лупу под задачу, пришла идея взять уже готового агента поAgent Client Protocol(stdio, JSON-RPC) и не городить свой HTTP-слой, а выставить наружу привычный OpenAI-совместимый API - один base URL, те же/v1/models,/v1/chat/completions(стейтлесс),/v1/responses(стейтфул), чтобы подключались обычные клиенты и SDK, типа Open WebUI и ана", "views": 839, "date": "2026-03-20"}, {"text": "Прокачал за вчера coddy.  Запилил такие вот фичи: - добавил в observer синхронизацию всех issues и pull_requests на старте системы - переработал логику раскладывания issues и pull_requests по разным папкам (рис.2) - добавил флоу автоматического тестирования…", "views": 626, "date": "2026-03-21"}], "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21T21:48:41.999599", "messages": [{"id": 39, "channel_id": 157, "message_text": "Привет, Павел!\n\nЯ Маартен из Голландии. Собрал Triall - фикс проблемы галлюцинаций.\n\nТри модели от разных компаний отвечают параллельно, потом анонимно рецензируют друг друга. Выдуманные факты не проходят peer review.\n\nGemini выдумал научные статьи с фейковыми DOI. Три модели это поймали. Одна бы пропустила.\n\nМодель поддакивает. Три модели спорят и находят правду.\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttps://triall.ai?lng=ru&utm_source=telegram&utm_medium=outreach&utm_campaign=evilfreelancer", "language": "ru", "approved": 0, "sent_at": null, "response_received": 0, "response_text": null, "notes": null, "created_at": "2026-03-21 14:48:41"}]}, {"id": 158, "telegram_username": "evilfreelancerhttps", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21 13:52:03", "messages": []}, {"id": 159, "telegram_username": "countwithsasha", "title": "Поляков считает: AI, код и кейсы", "description": "Пишу про AI, вайбкодинг и кейсы применения. Связаться:@polyakovbest", "subscriber_count": 4390, "language": "ru", "avg_post_views": 1369, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "daily", "admin_username": "polyakovbest", "admin_contact": null, "topics": ["AI/ML", "Programming", "Data Science", "NLP", "Robotics", "Science", "Education", "Productivity"], "tone": "technical", "sample_posts": [{"text": "Во все тяжкие: Mac Mini как сервер для ботовЛадно, я это сделал. Mac Mini M4 (16/512) для Telegram-ботов. Чтобы стоял в комнате, молча работал🤷Что не сделаешь, чтобы на стрижку и массаж через бота записываться.Старый бот пока живёт на виртуалке, тут хочу поднять нового. План такой:🔸Автопереключение на резервный ключ🔸Отдельный аккаунт iCloud, приглашённый в Family — общие папки для всех членов семьи, чтобы бот мог обрабатывать файлы🔸Два инстанса клешни — основной и запасной (запасной будет легаль", "views": 1750, "date": "2026-03-12"}, {"text": "Мак Мини, 100 рублей в неделю и никаких ограничений с лимитами для OpenClawКогда настраивал Мак Мини как агентную машину, понял, что хочу три вещи: никакой аффилиации с моими основными аккаунтами, никаких проблем с РКН и такой IP, который ни разу не светился в моих запросах к провайдерам.Логика простая: если кто-то мониторит злоупотребления подписками, мой основной аккаунт вообще не должен быть рядом с этой историей.🛠️Инструмент: CLIProxyAPIНашелCLIProxyAPI— API-шлюз, который оборачивает CLI-кли", "views": 2080, "date": "2026-03-13"}, {"text": "1M контекст в Claude — сожжёт лимиты или нет?Anthropicдал миллион токеновконтекстного окна по умолчанию всем подписчикам на Opus 4.6. Раньше Claude Code компактил контекст при приближении к лимиту ~200K (на самом деле 130), сжимая историю в резюме. Теперь можно тащить сессию целиком.🤔Такой ход как будто указывает на условный проигрыш Anthropic в битве за компакт. Codex производит его эффективнее, держит инструкции в диалоге, не останавливаясь на принудительные сжатия.Миллион контекста звучит дор", "views": 1820, "date": "2026-03-15"}, {"text": "Субагенты вместо скиллов: ходим по кругу управления агентамиНастраивалOpenClaw на Mac Miniи понял неочевидную вещь: для домашнего бота скиллы — это перебор.🏠Проблема со скилламиРеальный пример. У меня скиллдля заказа гостевых пропусков в УК. Он должен поддерживать задержки через lock-файлы, работать с несколькими модулями приложения. Добавляю загрузку квитанций — надо обновлять скиллы и на виртуалке, и на Mac Mini.Потом добавляешьскилл для ВкусВилл, для стрижки в ТопГане, для парковки — и ты уже", "views": 1360, "date": "2026-03-16"}, {"text": "Сложные задачи для OpenClaw, учим делегироватьКогдав чатах писали, что OpenClaw не тащит сложные задачи, я не придавал значения. Ну мало ли, модель не та, окружение кривое. Пока сам не попробовал.🦞Попробовал, признаю, долгоиграющие задачи сломаныРазвернул инстанс на Mac Mini, дал серьёзную задачу: рисерч на YouTube, отбор роликов-кандидатов по правилам, скачивание, транскрибация, обработка скиллом. Пять шагов, каждый из которых сам по себе сложный и/или долгий.Краб стал бесполезен. Согласовывал ", "views": 1440, "date": "2026-03-18"}, {"text": "Claude Dispatch: ваш мак теперь сервер с удалённым доступомВчераAnthropic выпустили Dispatch— удалённый доступ к Коворку через мобильное приложение Claude. Отправляешь задачу с телефона, идёшь по делам, возвращаешься к результату.Буквальнопозавчерая организовал диспетчеризацию между Codex и OpenClaw, чтобы не ждать выполнения задач — а сегодня вижу, что Anthropic сделали это базовым поведением.🔧Как работает механикаDispatch — бесконечный чат. Одна персистентная сессия между маком и телефоном. По", "views": 1330, "date": "2026-03-19"}, {"text": "Принял VibeCode-эстафету от Паши@evilfreelancerПопросил Claude Code пройтись по всем репозиториям на диске и собрать статистику коммитов за три года. Результат на картинке.😀Важно заметить, что я не программист и никогда не работал программистом). Откуда у меня вообще 2011 комитов в 2023 году узнаете из поста.⚡️Vibe Coding Effect: коммитов меньше, но они в 2,9× крупнееВ 2023 году — 2 011 коммитов, средний размер 111 строк.В Q1 2026 — 248 коммитов, средний размер 322 строки.За 39 дней 2026-го я на", "views": 1130, "date": "2026-03-19"}, {"text": "Claude Code придумал агентов на дежурстве (ну или повторил OpenClaw)Anthropicвыкатил Channels— способ пушить сообщения прямо в сессию Claude Code через MCP-сервер. Пока доступны Telegram и Discord, но архитектура открыта для любых источников.Это не «как у Краба», это архитектура вокруг CLI: канал — это MCP-сервер, который вбрасывает события в работающую сессию. Клод читает, делает работу и отвечает через тот же канал куда пришли уведомления.🤔Интересно, как при агентной коммерции будут доставлять", "views": 1000, "date": "2026-03-20"}, {"text": "Заповеди хорошего UI от OpenAIВчера OpenAI выпустили руководство, как выжимать из модели красивые интерфейсы. В целом правила общие для любых LLM, правила где-то противоречивые, но как направление для работы, полезно.Интересно то, что вместес галереей работкомпания явно пытается занять место среди решений для веб-разработчиков и дизайнеров.LLM — новая Тильда.Ссылка тутhttps://developers.openai.com/blog/designing-delightful-frontends-with-gpt-5-4🎨Без референсов — одинаковый мусорOpenAI прямо пишу", "views": 415, "date": "2026-03-21"}], "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21T21:48:41.996993", "messages": [{"id": 37, "channel_id": 159, "message_text": "Привет! Посты про Mac Mini для ботов и OpenClaw за 100 руб/нед - практичный контент, люблю такое.\n\nЯ Маартен из Голландии. Ты пишешь про кейсы AI. Вот кейс: главная проблема нейросетей - галлюцинации.\n\nСобрал Triall. Три модели от разных компаний отвечают параллельно, потом вслепую рецензируют друг друга. Атакуют аргументы, проверяют факты. Выдуманное не проходит.\n\nGemini в тесте сгенерировал научные статьи с фейковыми авторами и DOI. Одна модель бы приняла за правду. Три модели на рецензии это вскрыли.\n\nМодель тебе поддакивает. Три модели спорят и находят правду.\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttps://triall.ai?lng=ru&utm_source=telegram&utm_medium=outreach&utm_campaign=countwithsasha", "language": "ru", "approved": 0, "sent_at": null, "response_received": 0, "response_text": null, "notes": null, "created_at": "2026-03-21 14:48:41"}]}, {"id": 160, "telegram_username": "gleb_pro_aigithub", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21 13:52:03", "messages": []}, {"id": 161, "telegram_username": "the_ai_architect", "title": "Тимур Хахалев про AI Coding", "description": "Пишу про AI Coding, помогаю разработчикам освоить AI, внедряю AI в бизнес, провожу консультации.О каналеhttps://t.me/the_ai_architect/2Связь:@yatimur| Визитка:timurkhakhalev.t.me", "subscriber_count": 7590, "language": "ru", "avg_post_views": 5632, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "several-per-week", "admin_username": "yatimur", "a ковались, контракты расходятся, часть инструкций пропущено.Для меня это было", "views": 6700, "date": "2026-02-12"}, {"text": "Борис Черный продолжает делиться своими лайфхаками по работе с Claude CodeНа этой неделе он рассказал про кастомизируемость: настройка терминала, mcp, plugins, skills, agents и многое другое.Я для вас перевёл его тред и написал статью:◾️ЧитатьЕсли вы ещё не работали с Claude Code, то у меня для вас есть записанная лекция, где я познакомлю вас с фундаментальными знаниями о Claude Code, субагентах, оркестраторе, скиллах, а также, о том, как создавать свои собственные воркфлоу для автономной работы", "views": 5990, "date": "2026-02-15"}, {"text": "Проблема кодинга с AI в том, что оно, внезапно, требует подготовки и с наскока не получится добиться надёжного результата.Мои подписчики об этом точно знаютЗа 2025-й год я перепробовал много различных практик написания кода с AI. Примерно, начиная с лета, эти практики уже устаканились, к концу года скорректировались и вот, мы уже можем говорить о best practices, которые точно работают в AI coding.Об этих best practices говорят и вOpenAI,и вAnthropic,вSpotifyи других гигантах, но с опозданием на ", "views": 6900, "date": "2026-02-16"}, {"text": "Топ полезных постов канала за последнее время▪️knip + субагенты = чистый код после агентской сессии —Как подчищать за агентом▪️«Скорее всего» от агента означает, что он не знает. Добавь grounding —«Может быть» от агентов▪️Чем умнее модель, тем больше она ленится и выкручивается —Тяжело управлять агентами▪️10 советов по использованию Claude Code —от Бориса Черного, создателя Claude Code▪️AI пишет оверинжиниринг по дефолту. Решение через memory bank —Борьба с оверинжинирингом▪️Агент = герой фильма", "views": 7090, "date": "2026-02-17"}, {"text": "Мои друзья проводят конференцию ROИИ 202612 человек в течение 2-х дней будут считать прибыль и обсуждать рабочие стратегии, которые интересуют бизнес в сфере AI:- куда внедрять ИИ?- с чего начать внедрение?- какие есть подводные камни?- сколько стоит и какой ROI?- кого нанимать, а кого увольнять?Начало уже завтра, 19 февраля, в 13:30 по МСК.◾️Почитать подробнее◾️Зарегистрироваться бесплатно", "views": 7540, "date": "2026-02-18"}, {"text": "У codex появились нормальные субагенты!https://developers.openai.com/codex/multi-agentПока что пробую и мне в целом нравится. Где то сделано лучше чем в Claude Code, где то хуже. Но с учетом, что в codex сейчас лучшие модели на рынке, то у Антропиков не остается никаких шансов))Кодексам осталось ускорить инференс хотя бы на 30% и будем вообще идеально!Планирую записать видео по codex.Что вам было бы интересно узнать о нем?Лайк, репост,✔️Тимур Хахалев про AI Coding, подписывайтесь!", "views": 8940, "date": "2026-02-19"}, {"text": "небольшой пост о том что у меня происходитя услышал ваш запрос на создание видео по codex cli и начал накидывать сценарий, потратил несколько дней, разбирал свои настройки codex cli, тестил то, что до этого не пробовал, и тут openai разродились релизами и примерно за неделю зарелизили кучу крутых апдейтов для codex и меня потянуло всё это пробовать..- subagents (multi agents, выше про них писал)- войс мод- memory- и многое другоевидимо, Peter Steinberger (создатель openclaw) начал руководить про", "views": 6120, "date": "2026-02-27"}, {"text": "вы знаете, что я уже много раз хвалил codex, и я задумался о том, что сейчас в моих задачах как будто бы вообще никаких фундаментальных проблем не осталось. и вот это как будто бы вообще нереально, так что решил спросить у своей аудитории, что вы думаете по этому поводу.какие у вас сейчас есть актуальные проблемы с ai coding? что не получается? что не работает?а может быть у вас страх чистого листа и вы не знаете с чего начать?расскажите об этом и расскажите свой опыт - вы новичок или ужесмешари", "views": 5940, "date": "2026-02-28"}, {"text": "С какими типичными проблемами сталкиваются разрабы при попытке внедрить AI Coding1. Отсутствие тестов и документации.Причина - мы привыкли ть творить и реализ", "views": 4810, "date": "2026-03-10"}, {"text": "Как получить первое место в популярном бенчмарке1. Загружаем себе датасеты бенчмарка (они публичны)2. Проходим их вне конкурса и собираем для себя успешные \"траектории\"3. Зашиваем эти успешные траектории в свой coding agent в виде скилла4. При запуске benchmark harness, мы в качестве имени модели передаём туда зашифрованную xor строку вида <model>T<task-name>5. Наш coding agent незаметно деобфусцирует имя модели и подкидывает нужный скилл модельке6. Наш агент успешно проходит задачу7. На всякий ", "views": 4050, "date": "2026-03-14"}, {"text": "Codex — Мой инструмент на каждый день📱Смотреть на YouTubeУспейтепопробоватьCodex App (приложение) с удвоенными лимитами до 2 апреля.Обзорное видео на мой текущий инструмент! Показал так же какого уровня задачи я с ним делаю.Гоу смотреть!Лайк, репост,✔️Тимур Хахалев про AI Coding, подписывайтесь!", "views": 4430, "date": "2026-03-15"}, {"text": "Решил я тут поставить клешню (openclaw) второй раз в жизни (первый раз было 26 января)Кейс - дать клешне доступ к git repo и общаться с ним через чатик, просить вносить изменения в репо (это не кодинг, только некоторые заметки). Инпут - фото, аудио. Модель -z.ai(у меня годовая подписка на самом жирном тарифе простаивает)Решил ставить клешню на VPS, взял один из своих на 3 vcpu, 4 GB ram.Открыл codex app и попросил его настроить мне клешню. Выбрали конфиги, запустили openclaw, итог — 3 ядра и 4 G", "views": 3440, "date": "2026-03-16"}, {"text": "Шумно строил. Часто шиппил. Оставил следВот такойкринжовыйзаголовок GPT 5.4 придумал для моего дашборда со статистикой по гитхабу.Ринат@llm_under_hoodзапустил челлендж (суть - показать свою статистику по гиту: коммиты, проекты, loc), а Нейро Ковальский (@neuraldeep) передал мне эстафету, так что делюсь своей статистикой!Продолжение в комментахМожно заметить, что как и у многих, больше всего кода стало генериться начиная с октября-ноября — тогда как раз появились наконец-то крутые модели и мы их ", "views": 2450, "date": "2026-03-19"}], "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21T21:48:41.995558", "messages": [{"id": 36, "channel_id": 161, "message_text": "Привет! Пост про \"из 40 разработчиков оставили 10\" и перестройку под AI - реально важная тема.\n\nЯ Маартен из Голландии. Сделал Triall - инструмент, который убивает галлюцинации нейросетей.\n\nТри модели от разных провайдеров работают параллельно: отвечают независимо, потом анонимно рецензируют друг друга. Атакуют аргументы, ловят выдуманные факты, находят логические дыры.\n\nКогда работаешь с одной моделью, она тебе поддакивает. Когда три модели проверяют друг друга вслепую, галлюцинации не проходят. Gemini в тесте выдумал научные статьи с фейковыми авторами и DOI. Другие модели это поймали.\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttps://triall.ai?lng=ru&utm_source=telegram&utm_medium=outreach&utm_campaign=the_ai_architect", "language": "ru", "approved": 0, "sent_at": null, "response_received": 0, "response_text": null, "notes": null, "created_at": "2026-03-21 14:48:41"}]}, {"id": 162, "telegram_username": "alexs_journalhttps", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21 13:52:03", "messages": []}, {"id": 163, "telegram_username": "aostrikov_ai_agentshttps", "title": null, "description": null, "subscriber_count": null, "language": null, "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": null, "admin_username": null, "admin_contact": null, "topics": null, "tone": null, "sample_posts": null, "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "discovered", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21 13:52:03", "messages": []}, {"id": 164, "telegram_username": "oestick", "title": "AI и грабли", "description": "Строил HR продукты для американского бигтеха. Внедряю AI в чужие бизнесы и команды, пишу про свои ошибки и находки@nikolay_sheyko", "subscriber_count": 12100, "language": "ru", "avg_post_views": 7316, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "several-per-week", "admin_username": "nikolay_sheyko", "admin_contact": null, "topics": ["AI/ML", "Programming", "Data Science", "Robotics", "Crypto/Web3", "Startups", "Science", "Education", "Productivity"], "tone": "casual", "sample_posts": [{"text": "Обходим главное ограничение Сodex (отсутствие субагентов)Фан факты:1. Внедавнем исследовании от Cursor(сотня агентов неделю писали браузер) оказалось, что gpt-5.2 работает лучше на больших тасках, чем opus-4.52. При этом адекватные лимиты у OpenAI можно получить за 20$ против 100$ у Anthropic3. И при этом в их Codex все еще не завезли субагентов🙈4. Зато OpenAI решили хайпануть на запрете Антропиков использовать свою подписку в топ-1 опенсорсном cli-агенте OpenCode – и сделали для них нативную ин", "views": 5730, "date": "2026-01-22"}, {"text": "Кодинг-агент в телефоне (ч.1)Частый вопрос в ИИ чатиках – как работать с ИИ агентом с телефона. Единственный стабильно рабочий совет, который я видел – ставить Claude Code на VPS и подключаться через  termius.Ниже инструкция:1️⃣Покупаем VPS. Топ: Hetzner, DigitalOcean. Дешман:RackNerd. В РФ – хз, посоветуйте в комментах2️⃣Настраиваем его с sudo доступом без пароля – чтобы агент мог делатьвсе. VPS – по сути сэндбоксЕсли вы не опытный пользователь linux, то просто открываем Claude Codeлокальнои вс", "views": 11500, "date": "2026-01-23"}, {"text": "Кодинг-агент в телефоне(ч.2)Впрошлом постерасписал дефолтный подход с termius. Но консольный UX на тачскрине – достаточно сомнительный. Так что у меня давно чесались руки затестить еще одну идею, которую еще нигде не видел. И вот вчера руки наконец дошлиВ чем идея:1. Есть очень хороший кодинговый агент OpenCode. Пожалуй, ближайший к CC по плотности фич, а покачествуреализации, пожалуй, даже лучше2. В отличие от остальных агентов, он написан в классическом клиент-серверном подходе – отдельно бэк,", "views": 5540, "date": "2026-01-27"}, {"text": "Надиктовал промпт в CLI агенте – а он схлопнулся в[Pasted text +24 lines].Запускаешь, а там артефакты от диктовки → в итоге агент 5 минут делает не то, что нужноУзнали?Не понимаю, зачем это сделали дефолтным поведением.Короче, вот как пофиксить этот бред:OpenCode~/.config/opencode/opencode.json{\"experimental\": {\"disable_paste_summary\": true}}Codex CLIНе лечится :(Claude CodeОфициальной настройки пока нет. Workaround: Ctrl+G перед отправкой — откроет prompt в редакторе, там видно весь текст.Либо ", "views": 5650, "date": "2026-01-30"}, {"text": "Краткие сводки по hype-train:- OpenClaw разгоняется за неделю до 150к⭐️на GitHub, сменив 3 названия (ex-clawdbot, ext-moltbot)- Многие люди вне пузыря \"Claude Code и ко\" впервые трогают настоящих ии-агентов- В процессе сливается огромное количество приватных данных и доступов- Появляютсятвиттеритиндердля ИИ-агентов (первый оказывается дырявым и сливает API ключи агентов)- Но прогресс не остановить – люди теперь знают, чтотак можно– ждем распространение агентов вне отделов разработки (см.прогноз ", "views": 5170, "date": "2026-02-02"}, {"text": "Краткие сводки по hype-train:  - OpenClaw разгоняется за неделю до 150к⭐️на GitHub, сменив 3 названия (ex-clawdbot, ext-moltbot)  - Многие люди вне пузыря \"Claude Code и ко\" впервые трогают настоящих ии-агентов  - В процессе сливается огромное количество…", "views": 7420, "date": "2026-02-02"}, {"text": "Протухание контентаТолько собрался писать пост о том, как я его учил свою подругу маркетолога использовать OpenCode, который пару дней назад появился в форме десктопного аппа с нормальным UI,Как сегодня выходит десктопный UI для кодекс🤯———Скачать OpenCode(Mac, Windows, Linux)Скачать Codex(Mac-only)Обзор по фичам на картинке ниже (разбортолькопо десктопным фичам):ваш,@ai_grably", "views": 7820, "date": "2026-02-03"}, {"text": "Для любителей консольных агентов:Новомодные графические оболочки для агентов обычно проигрывают консольным версиям по фичам.За исключением разве что встроенного управления worktrees и удобной панелькой с диффами справаДо меня чет долго доходило, что есть прекрасные консольные утилиты, которые дают такой же экспириенс:brew install lazygitваш,@ai_grably", "views": 7390, "date": "2026-02-06"}, {"text": "Организация ивентов для сообщества – та еще запара.При этом, после того как начал, сложно перестать – хочется сделать еще больше, масшабнее, глубжеПосле прошлой конфы мы договорились сМаксом, что если соберемся делать еще, то только если собирать самых селебных селеб ИИ-телеграма.И постараться сделать так, чтобы на организацию ушло не больше 20 часов от каждого.Наивно.Даже сам набор спикеров занял больше – начиная состыковкой разных по вайбу ребят в цельную программу, заканчивая поиском теплых и", "views": 6110, "date": "2026-02-13"}, {"text": "Сдвиг 2025 → 2026. Забавное наблюдение с моих консультаций:Во второй половине 25го года ко мне стали часто приходить компании с просьбой поревьюить их AI системы.И почти всегда консультация шла по следующему сценарию:1. Рассказывают/показывают свой сложный комбайн:- Кастомный процессинг pdf в текст- sparse/dence индексация- RAG на эмбеддингах + bm25- Всякие HyDE, context enrichment, query expansion, etc- Каскад из вызовов LLM- Какой-то хитрый трюк для извлечения референсов- Опционально fuzzy мэт", "views": 6480, "date": "2026-02-16"}, {"text": "Делюсь своими факапамиНедавно внедрял современные практики по AI-assisted-coding в команду разработчиков. В этот раз было в новом для меня формате – не просто консультации или полноценное обучение, а \"прийти и помочь все настроить, чтобы команда пользовалась\"Первый факап – а полез сам руками переписыватьCLAUDE.md. Догадываетесь, почему это плохо? Да просто у меня нет tacit knowledge – неявных знаний про процессы, код и продукт, которые есть у команды. Синки с ребятами естественно это не исправил", "views": 8140, "date": "2026-02-18"}, {"text": "Последнее время часто провожу воркшопы про ИИ-агентов в разработке.Чтобы быть \"на острие\" и правильно раздавать советы, стал в своей работе параллельно использовать все три основных: Codex, Claude Code и OpenCode.И чем дольше их использую, тем больше различий вижу.Ниже – подробное сравнение важных для меня фичей с коротким описанием где они пригождаются@ai_grably", "views": 11900, "date": "2026-02-18"}, {"text": "По кулуарным разговорам вижу, что в айтишке сейчас у людей две головные боли:1️⃣Чтобудет с рынком через год и успеть подготовиться: нанять/уволить правильных людей, освоить инструменты, которые станут новым экселем, выбрать проект, котором не урежут финансирование.2️⃣Какначать внедрять ИИ уже сейчас. И в свою собственную рутину, и в команду/компанию.Проблема в том, что знания о томкакделать, чтобы работало – разбросаны по головам тех, кто уже что-то попробовал, наступил на грабли и нашел способ ", "views": 10300, "date": "2026-02-23"}, {"text": "Дашборд по вызовуили как получать инсайты о своем продукте за 2 минуты и пару строк текстаОбычно, чтобы принять продуктовые решения, нужно либо самому писать SQL запросы и собирать дашборды, либо дергать аналитика, либо вообще действовать начуйкевайбеБольше не нужно.Мой сегодняшний детский восторг – ваншотнул отдельный дашборд-сервис для бота, которым мы выдаем доступ к конференциям.Запрос пишу текстом и сразу получаюинтерактивныйдашборд с настройками, релевантными дляэтого конкретного запроса. ", "views": 8240, "date": "2026-03-03"}, {"text": "Как качать карьеру в сторону ИИ?Простой ответ – ХзСложный – искать, где в текущей компании применить ИИ (за счет работодателя). В идеале, чтобы ему это тоже принесло денег. Сложный – потому что обычно это еще нужно продать менеджменту (уметь говорить на языке бизнеса, видеть релевантные проблемы и пилить по выходным демки).Есть еще один способ – устроиться куда-то, где ИИ – часть продукта. Если уже есть навыки, я бы сразу искал AI-engineering вакансии.Правда, у тех, кому важен вопрос в начале по", "views": 5520, "date": "2026-03-09"}, {"text": "Апдейты по моему флоу кодинга с агентами:1️⃣Перелез на Codex Desktop- Они наконец добавили/forkи возможность редактировать сообщения- В отличие от tui, есть mermaid рендерер: теперь итерации планирования и рисерча сильно быстрее – многие штуки мне быстрее понять визуально, чем из объяснений ИИ (надо попросить вagents.md)- Все еще не хватает норм хоткеев- Зато есть/fastрежим. Для execution – не важно, будет агент работать час или полтора, а вот для планирования – опять же, сильно ускоряет итераци", "views": 4160, "date": "2026-03-12"}], "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21T21:48:41.992390", "messages": [{"id": 34, "channel_id": 164, "message_text": "Привет! Канал огонь. Пост про обход ограничений Codex - в точку, и кодинг-агент в телефоне через Termius практично.\n\nЯ Маартен из Голландии. Ты пишешь про грабли с AI. Вот главные грабли, на которые наступают все: галлюцинации.\n\nСделал Triall. Три модели от разных провайдеров отвечают независимо, потом вслепую рецензируют друг друга. Атакуют аргументы, проверяют факты. Выдуманное не проходит.\n\nGemini в тесте выдумал целые научные статьи с несуществующими авторами. Одна модель бы проглотила. Три модели в режиме peer review поймали.\n\nМодели обучены тебе поддакивать. Triall заставляет их спорить друг с другом.\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttp Qwen3-Coder-Next - 80B парамет", "views": 6900, "date": "2026-02-07"}, {"text": "Поляков считает, что он победил управляющую компаниюРазогнался с навыками для OpenClaw и заметил неэффективность:чтобы курьер Вкусвиллпопал к нам домой, надо зайти в приложение УК и заказать пропуск. Иначе — пропущеные звонки, недоставленные заказы и нервы.Наш Домпульт ужасен: 5 экранов ради одного пропуска. А гостевой паркинг — вообще боль: слоты по 30 минут, максимум 3 за раз, по мере освобождения можно ещё 3. Без пропуска — предупреждение, потом бан.🔍Charles Proxy: приложение для отладки траф", "views": 5210, "date": "2026-02-11"}, {"text": "Slidev- пожалуй лучший способ создавать презентации в эпоху AI. Markdown-first, с мощным тулингом и экспортом в PDF и PowerPoint. Делюсь своим опытом.Инструментов для презентаций сейчас вагон - от классических PowerPoint и Google Slides до Figma Slides, Gamma, и в каждом втором туле от NodebookLM до Perplexity. Но для своих выступлений, перепробовав кучу вариантов, я как file-first адепт искал инструмент на базе markdown. Сначала это былMarp- хорош для минимальных слайдов, но ограничен. В Slidev", "views": 6750, "date": "2026-02-12"}, {"text": "#ReDigestПродолжаемсубботнюю рубрику, тут я кратко рассказываю про новости из мира технологий и AI, которые привлекли мое внимание.Дайджест недели:-  Bytedanceхайпятс Seedance 2.0 - новой SOTA видео-моделью с мощно подросшим качеством генерации и нативным аудио.-  OpenAIпредставилаGPT-5.3-Codex-Spark - компактную модель для кодинга в реальном времени, работающую на чипах Cerebras (>1000 t/s)-  GoogleвыпустилиGemini 3 Deep Think - обновленный ризонинг мод, который выбил SOTA на нескольких бенчмар", "views": 7060, "date": "2026-02-14"}, {"text": "Самые полезные вещи про AI я узнаю из разговоров с теми, кто уже внедрил и набил шишки.19–20 февраля как раз такой формат: ROИИ 2026. Конфа, где спикеры делятся опытом внедрения: ROI, P&L, unit-экономика, стоимость ошибок, практические советы по внедрению.Выступаю и азываю про новости из мира технологий и AI, которые привлекли мое внимание.Дайджест недели:- AnthropicотказалаПентагону в использовании Claude для массовой слежки и автономного оружия. Пентагон разорвал контракт, Трамп потребовал отказаться от Claude во всех фед. агентствах. Anthropic оспорит решение в суде. Ирония: OpenAI тут жезаключилааналогичный контракт с оборонкой, за что многие сталиотменятьподписки.- AlibabaвыпустилаQwen 3.5 Medium:", "views": 5670, "date": "2026-02-28"}, {"text": "Про PDF OCR и Bounding Boxes: рентген для ваших документов - где это применяется и на что обращать внимание при выборе парсеров документов.Сейчас работаю над проектом, где также требуется ручная проверка результатов AI. И в очередной раз провел раунд сравнения различных инструментов для парсинга PDF. Расскажу про bbox в целом и конкретные тулы, которые я использую.Про bbox я ужеупоминал- это координаты прямоугольника, который описывает положение элемента на странице. Формат обычно[x1, y1, x2, y2", "views": 5450, "date": "2026-03-04"}, {"text": "#ReDigestПродолжаемсубботнюю рубрику, тут я кратко рассказываю про новости из мира технологий и AI, которые привлекли мое внимание.Дайджест недели:- OpenAIвыпустилиGPT-5.4 и GPT-5.4 Pro: 1M токенов, нативный computer use, на 33% меньше ошибочных утверждений по сравнению с GPT-5.2. Еще выкатили и сделали дефолтнойGPT-5.3 Instant.- AppleпредставилаMacBook Neo за $599 - первый Mac на чипе от iPhone (A18 Pro). Также вышли MacBook Pro на M5 Pro и M5 Max.- GoogleвыпустилGemini 3.1 Flash-Lite - самую б", "views": 5150, "date": "2026-03-07"}, {"text": "Ваш кодинг-агент уже выбрал ваш стек. Вы просто еще не заметили.Исследователи из Amplifying прогнали около 2,5 тыс. открытых запросов к Claude Code типа \"добавь базу данных\", \"как задеплоить\", \"добавь аутентификацию\" ни разу не назвав конкретный инструмент. Записали, что агент выбрал и сделал.Получиласькарта того, как AI-агенты формируют стек за разработчиков.Что нашли-Монополии.GitHub Actions еланного за 4 дня!Мы с Денисом записали для вас, как это было.Коротко по фактам:1. В марте 2025 года Денис запускает Yadaphone – простой аналог Skype2. Первую версию делает в одиночку за 4 дня3. Спустя 11 месяцев проект выходит на $17К+ выручки в месяцСобрали в единый материал:1️⃣как появилась идея после закрытия Skype2️⃣как устроена простая модель монетизации с кредитами3️⃣почемупользователи находят и устанавливают проект бесплатноКороче, главные ин", "views": 29600, "date": "2026-02-11"}, {"text": "🔞А вы знали, что цена — далеко не самый важный фактор в выручке приложения?Гораздо сильнее на выручку в вашем приложении влияют…биллинг-циклы.Что это за зверь?Тот самый переключатель, где вы выбираете: платить раз в месяц или раз в год.Первые два года в наших проектах я делал только месячные подписки.Ну потому что раз в СНГ покупают месячные тарифы, то годовой нужен для галочки. Короче, нам можно не делать))А теперь интересный инсайт.Если сегодня сложить наши проекты с выручкой > $10К в месяц, т", "views": 26800, "date": "2026-02-13"}, {"text": "Время покажет.У вас было такое, что чей-то поступок кажется странным?Ты споришь, объясняешь, доказываешь.Но проходит время — и оно всё объясняет ЗА тебя и ЛУЧШЕ тебя.Человек просто говорит:— А, вот теперь понятно.А тогда  —  вообще нет.Я уверен, что все проходили такое вотношениях🙂А теперь интересный нюанс.В онлайн-проектах работает ровно та же механика!Бывает так: человек запускает проект на нашей программе.К нему приходят сотни пользователей, потом тысячи.Логика простая: спокойно дорабатывай п", "views": 26000, "date": "2026-02-16"}, {"text": "🍉$4 000 за первый месяц… на оффлайн-генераторе картинок на iPhoneЗнакомлю с участником нашего сообщества — Шынгысом.В какой-то момент его зацепила мысль:А что, если генерировать AI картинки прямо на телефоне — без сервера?Ведь Apple выпустила Neural Engine. И теперь можно генерить картинки локально на телефоне за 5–10 секунд.Шынгыс решил:Окей, вокруг этого можно сделать продукт.И за 2 месяца сделал первую версиюLocalGen.Просто открыл приложение → написал текст → получил картинку.Т.е. оффлайн, пр", "views": 27000, "date": "2026-02-18"}, {"text": "♟Представьте, что вы продумали партию в шахматы на 15 ходов вперед.Вы:– рассчитали дебют– видите середину игры– понимаете, как будете давить в эндшпиле– даже знаете, где соперник ошибетсяА потом…На 2-м ходу зеваете фигуру.И вся гениальная стратегия превращается в попытку выжить.В онлайн-проектах постоянно происходит ровно то же самое.Человек:– реализует сразу кучу функций, чтобы «дать больше ценности»– раскатывает куберы, чтобы «сразу было масштабируемо»– пилит сложную админку– оптимизирует прое", "views": 27500, "date": "2026-02-20"}, {"text": "💔Романтические отношения = отношения с проектомСлышали такие истории?Один человек встречает другого. Пара видит совместное будущее.Проходит время и люди понимают, что им не по пути.Встречает другого человека. Еще попытка.А потом тот же результат.Третья попытка.Четвертая.Пятая.Некоторые в какой-то момент делают вывод:«Наверное, мне просто не суждено встретить своего человека».Хотя чаще всего проблема в  том, что ВСЕ выбранные люди были одного и того же типа.Но мозг очень любит такие выводы.Он гов", "views": 23600, "date": "2026-02-23"}, {"text": "👫Посвящается любящим женам и мужьямВижу по комментам в ЛС, что вам понравилось читать про онлайн-проекты и отношения одновременно!)Держите еще интересный факт)Вы знаете, что у нас есть программа, где мы запускаем онлайн-проекты по нашему методу.Так вот. У нас есть категория участников, у которыхнеприлично чащеполучается сильный результат по пользователям и выручке.Это пары.Например, у нас на программе Денис и его супруга Ксюша запустилиYouTube to Text. Проект позволяет транскрибировать видео.Сей", "views": 22100, "date": "2026-02-25"}, {"text": "👦🏻Какая реклама работает для продвижения онлайн-проекта?На старте — почти никакая.И это одна из самых частых ошибок, которую допускают создатели онлайн-проектов.Человек только выкатил первую версию приложения.Пока:— ноль понимания, что в нем хорошо— ноль понимания, что в нем плохо— ноль понимания, нужен ли вообще этот проект людям??Но обычно первая мысль: “пойду куплю рекламу”В итоге деньги в рекламе сливаются на рандомные креативы из рандомных текстов + картинок.При этом, рабочая связки для рек", "views": 22600, "date": "2026-02-27"}, {"text": "🎨$8К/месяц на офлайн-генерации картинок прямо на iPhone!Мы с Шынгысом записали для вас интервью, как это было.Коротко по фактам:В ноябре 2025 года Шынгыс запускает iOS приложение для генерации изображений полностью офлайн.Делает первую версию примерно за 2 месяца и выкатывает её, несмотря на баги.Спустя месяц проект приносит ~$4 000 выручки. Через 4 месяца проект выходит на $8К/месяц.Собрали в единый материал:1️⃣как была придумана идея2️⃣как продвигался проект бесплатно и платно через Reddit4️⃣к", "views": 22400, "date": "2026-03-02"}, {"text": "🚢А что если сделать онлайн-проект для бизнеса?Классический сценарий, который вижу постоянно:Айтишник придумывает идею из головы:Cделаю свою платформу для застройщиков!Рынок огромный. Компании точно будут этим пользоваться.И дальше год пилит продукт.Что потом:→ Запуск→ Понимание, что на продажи не осталось сил (да и нет умения продавать в принципе)→ Проект закрытПотому что многие недооценивают, что происходит после разработки.Большие компании – это не пользователи-физики.У компаний (сложные!) рег", "views": 19400, "date": "2026-03-04"}, {"text": "👆Когда за 1 ночь пришлось сделать сервис для бизнеса)В том году Денис в одиночку запустил Yadaphone – сервис для телефонных звонков через браузер.Посмотрите полторы минуты о том, как к Денису пришел первый бизнес-клиент и как он ночью делал для него первую версию)Теперь бизнес приносит 30% от всей выручки Yadaphone. А выручка сервиса в месяц – более $17500.О том, как запускался сервис, как продвигался, что именно привело к $17К+ выручке через 11 месяцев после запуска – можно почитатьв нашем полн", "views": 19200, "date": "2026-03-05"}, {"text": "🙂Иногда выручка онлайн-проекта зависит… от одного маленького окошка.Вот этого👆Это пейволл — окно оплаты внутри вашего проекта.Большинство создателей приложений думают так:“Ну поставлю кнопку оплаты — и пойдут платежи”.На практике:Либо платежей почти нет.Либо они в 10–100 раз ниже, чем могли бы быть.У нас куча примеров, когда правильная настройка одного этого окна увеличивала прибыль проекта в десятки, а иногда и сотни (!) раз.Потому что пейволл — это не просто 1 кнопка.В каком порядке мы настраи", "views": 21500, "date": "2026-03-06"}, {"text": "🍎$15 000+ MRR на сервисе для поиска вирусного контентаДочитайте пост до конца, потому что развязка будет неожиданная.Знакомлю с участником нашего сообщества – Ильей.Илья заметил, что обычно виральные видео для Тиктока делают так:– собирают контент, который прямо сейчас залетает у конкурентов– и переснимают его, адаптируя под себяИлья решил сделать инструмент для поиска такого контента, который отвечает на 1 вопрос:Какой контент прямо сейчас залетает в моей нише?Первая версия выглядела максимальн", "views": 19100, "date": "2026-03-11"}, {"text": "🥵Как не бросить делать онлайн-проект?Такой вопрос прилетел в личке.По своему опыту: чтобы проект получился, я забываю про то, что делаю проект!Как, например, чтобы появился этот пост, мне было важно забыть, что я пишу пост!1️⃣Появилась тема — просто думаю про неё. Без цели.2️⃣Пришли мысли — несвязно записываю.3️⃣Раз записал — чуть оформляю.4️⃣Раз оформил — ну давай выложим.Не было момента “я сел писать пост”.Была просто цепочка интересных для меня,очень легких маленьких действий.Точно так же под", "views": 17900, "date": "2026-03-13"}, {"text": "💔Telegram блокируют. Но кто-то даже в этом увидел возможность.В мини-проектах есть один мощный бустер. Тайминг запуска.Наши самые прибыльные онлайн-сервисы появились именно так.Появляется новая технология →мы быстро делаем маленький сервис →и продвигаем его по нашему методу.Например, так происходит с AI.Появляется новая модель – мы делаем сервис. И продвигаем по нашему методу.Сейчас больше половины выручки приходит из таких микро-проектов. Запущенных под грамотный тайминг.Но иногда возможности п", "views": 15300, "date": "2026-03-16"}, {"text": "🧠Запуск свого проекта как терапияСейчас у нас идет программа, где мы создаем маленькие приложения, продвигаем их и монетизируем по нашему методу.На этом потоке есть одна очень показательная история.Саша, один из участников программы, заметил, что в среднем в мире 10–12% людей страдают от сухости глаз.Это около 1 млрд человек.И это не просто “дискомфорт”.Для понимания — люди не могут долго работать, падает концентрация, появляется усталость, ухудшается качество жизни.В итоге мы с Сашей запускаем ", "views": 9780, "date": "2026-03-18"}, {"text": "Быть проще - это очень сложно. Но выгодно🙂Очередной раз прилетел вопрос такого плана:Вот у вас есть проект, который одной кнопкой блокирует сайты, которые отвлекают от работы.Почему за ОДНУ кнопку \"заблокировать\" люди платят??Есть же куча навороченных блокировщиков c кучей других полезных функций.Почему платят за ваш из одной кнопки?Ответ: простота решает.Задумайтесь.Жизнь не черно-белая. Каждый день мы взвешиваем, оцениваем, выбираем.Это выматывает.У человека не остается свободного ресурса. Его", "views": 6450, "date": "2026-03-20"}], "tgstat_url": null, "source": "cross-reference", "relevance_notes": null, "status": "scraped", "created_at": "2026-03-21 13:52:03", "updated_at": "2026-03-21T20:53:51.158742", "messages": []}, {"id": 101, "telegram_username": "neyroskuf", "title": "Нейроскуф | Про Нейросети&AI", "description": "Нейросети - не магия. Покажу, что у них под капотом. Учим ИИ работать на тебя.Для связи@balthazar19Сотрудничествоak26.ruЗабрать 15 бонусных токенов и 15% скидку за доступ ко всем современным нейросетям:https://t.me/syntxaibot?start=aff_909136800", "subscriber_count": 5470, "language": "ru", "avg_post_views": 1217, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "daily", "admin_username": "balthazar19", "admin_contact": "связи@balthazar19Сотрудничествоak26.ruЗабрать", "topics": ["AI/ML", "Programming", "Data Science", "Computer Vision", "Productivity", "Hardware"], "tone": "casual", "sample_posts": [{"text": "🤖Потестил GPT-5.3 и GPT-5.4Это не взаимозаменяемые режимы. Т.е, то, что 5.4 вышла через 48 часов после 5.3 - не значит, что 5.3 устарела.5.3 Instant - это версия для обычного чата. По дефолту и на бесплатном теперь тоже.GPT-5.4 Thinking - это отдельный reasoning-режим для сложной работы. Отдельно важный момент по механике: у 5.4 Thinking есть upfront plan. Пока модель думает, в нее можно докинуть инструкцию и поправить направление до финального ответа. Такое было у 5.2 PRO.И по ощущениям 5.4 - э", "views": 1470, "date": "2026-03-10"}, {"text": "📼Таймлапс видео в VEO3Прикрепляем фото и пишем промпт:Создай короткое кинематографичное видео на основе этого изображения, в котором человек в центре остается неподвижным и смотрит камеру, в то время как люди вокруг него быстро двигаются в стиле таймлапс, создавая эффект размытия в движении. Сохрани темный, атмосферный тон и освещение оригинального снимка. На заднем плане должно присутствовать легкое дрожание камеры и размытие, чтобы подчеркнуть контраст между неподвижным главным героем и суетли", "views": 1480, "date": "2026-03-10"}, {"text": "🤖MagicPath - ИИ для интерфейсовНаткнулся наMagicPath. По сути это ИИ-дизайн тул для интерфейсов: можно описать экран или компонент текстом, получить готовый UI, потом допилить его в чате или руками прямо на канвасе.Можно начать с текста, можно затащить существующий Figma-дизайн, а можно через Chrome extension захватить реальный элемент с сайта и притащить его в проект как редактируемый компонент. После этого все это можно собрать во флоу и выгрузить в React-код.Для старта есть бесплатный тариф с", "views": 1390, "date": "2026-03-11"}, {"text": "MJMacro photography --chaos 28 --ar 4:5 --sref 1763272008 --stylize 1000 --v 6.1", "views": 1460, "date": "2026-03-11"}, {"text": "🤑Dexter - open-source агент для финансового ресерчаDexter- это автономный агент под задачи по рынку и компаниям. Он нужен для задач, где надо не просто ответить на вопрос, а последовательно собрать данные по компании или рынку, проверить их и выдать итоговый вывод. Подходит для разбора отчетности, сравнения компаний и сбора данных по рынку.Работает так: сначала строит план решения, потом по шагам собирает нужные данные, сверяет промежуточные выводы и только после этого формирует ответ. В проекте", "views": 1510, "date": "2026-03-12"}, {"text": "📼Делаем стильный оупенинг для логотипа в VEO 3Генерируем лого в Нано Банано:Гиперреалистичный крупный план прозрачного неонового стеклянного куба, лежащего на черном вулканическом песке. Внутри стеклянного куба светящееся расплавленное золото образует слова \"Нейроскуф\" жирным футуристичным шрифтом без засечек. Надпись должна полность поместиться и не переноситься на одну из граней. Отражения неонового текста видны на влажных песчинках. Разрешение 8k, макросъемка, глобальное освещение с трассиров", "views": 1460, "date": "2026-03-12"}, {"text": "📖llm-checker - как быстро понять, какую LLM потянет ваш ПКllm-checker- это CLI-инструмент для подбора локальной LLM под конкретное железо и Ollama. Он сканирует систему и считает, какие модели реально запустятся на вашей машине, а потом ранжирует их по 4 параметрам: качество, скорость, влезаемость в память и контекст. Сейчас он работает с пулом из 200+ моделей и их вариантов.Утилита умеет дать рекомендации по категориям вроде coding, reasoning и multimodal, отдельно проверить уже скачанные Ollam", "views": 1590, "date": "2026-03-13"}, {"text": "Самое простое объяснение термина «промпт инджекшен»😂", "views": 1320, "date": "2026-03-15"}, {"text": "Небольшой апдейт по каналу🐈Всю прошлую неделю и по теперешний момент - я занимался переездом с семьёй в другой город. Времени ушло гораздо больше, чем планировалось и, к сожалению, еще и техничес  было так легко.", "views": 29400, "date": "2026-03-15"}, {"text": "Тут Хуанг опять сливает размеры моделей OpenAIПохоже в GPT-5 всего два триллиона параметров. Раньше он так же показывал количество параметров для GPT-4 (GPT MoE 1.8T). То есть у OpenAI размер флагманской модели за три года не вырос совсем.@ai_newz", "views": 27400, "date": "2026-03-16"}, {"text": "Mistral выкатили Small 4И всё грустно. На опубликованных бенчах модель проигрывает сентябрьскому Qwen 3 Next, у которого в полтора раза меньше параметров в целом и в два раза меньше активных.Моделька мультимодальная с 256к токенов контекста. Архитектура — та же вариация на тему DeepSeek V3 что использовалась вLarge 3. Доступна по Apache 2.0, базовую модель не выложили, но зато сделали голову для спекулятивного декодинга.Веса:FP8/NVFP4@ai_newz", "views": 26200, "date": "2026-03-17"}, {"text": "Партнеры Nvidia открыли предзаказы на DGX StationЭто десктопная машинка с одной GB300 на 748 гигов оперативки внутри (треть из этого HBM 3E, остальное LPDDR5X). Цены начинаются на отметке в $87k.@ai_newz", "views": 28000, "date": "2026-03-17"}, {"text": "Midjourney V8 alpha!Все долго ждали новой модели от MJ и вот она (ну почти)!Что обещают:— лучшее понимание сложных промптов— сильнее personalization / sref / moodboards— более детальные и цельные картинки— лучше рендер текста, особенно если писать его в кавычках— генерация примерно в 5 раз быстрееЧто важно:— есть --hd (нативный 2K) и --q 4 для большей когерентности— поддерживаются --raw, --chaos, --weird, --exp— --hd, --q 4, sref и moodboards сейчас в 4 раза дороже и медленнееСами Midjourney сов", "views": 24200, "date": "2026-03-18"}, {"text": "Street View через нейросетьКорейцы из Naver показали Seoul World Model — заметную часть Сеула вышло впихнуть в одну модельку. Это модель реального места, которая не разваливаясь позволяет путешествовать много километров подряд. Можно и промптить модель творить с городом всякие непотребства — наводнение, напададение инопланетян и Годзиллы.Сделали это на основе Nvidia Cosmos Predict 2.5 — DiT на 2 миллиарда параметров, а тренировали всего на 24 H100. Моделька выдаёт 15 fps на одной H100, но оптими", "views": 24400, "date": "2026-03-18"}, {"text": "Партнеры Nvidia открыли предзаказы на DGX Station  Это десктопная машинка с одной GB300 на 748 гигов оперативки внутри (треть из этого HBM 3E, остальное LPDDR5X). Цены начинаются на отметке в $87k.  @ai_newz", "views": 23900, "date": "2026-03-18"}, {"text": "Cursor релизнули Composer 2Это второе поколение собственных моделей стартапа. Заявляют что она на уровне опуса, при этом заметно дешевле, но явно нужно тестить самим.Модель довольно дешёвая — $0.5/$2.5 за миллион токенов, но дьявол в деталях: по дефолту юзерам дают fast версию, которая стоит $1.5/$7.5 за лям токенов. Кроме этого она доступна по подписке.@ai_newz", "views": 22900, "date": "2026-03-19"}, {"text": "Похоже Composer 2 — это пост-трейн китайской Kimi 2.5Сразу после выхода Composer 2 пользователи заметили что модель на эндпоинте называется kimi-k2p5-rl-0317-s515-fast, а чуть позже пошли (ныне удалённые) шокированные твиты от команды Kimi — по их словам они ничего не знали об использовании Cursor их весов. И раньше ходили слухи что оригинальный Composer был основан на китайской модели — GLM 4.6, так что прецедент такого \"ребрендинга\" есть, но там ситуация отличается.Дело в лицензии — если GLM л", "views": 23200, "date": "2026-03-20"}, {"text": "Вот и настоящая реалтайм генерация видео подъехалаRunway и NVIDIA выкатили Gen-4.5 на новых чипах Vera Rubin. Теперь HD-видео генерится в реальном времени с задержкой в жалкие 100 мс, позволяя менять промпты и режиссировать сцену прямо на лету, без всяких ожиданий рендера.Главная фишка релиза кроется в GWM-1 — авторегрессионном симуляторе физического мира. Это семейство из трёх специализированных моделей: GWM Avatars генерит интерактивных говорящих голов, GWM Robotics работает как песочница для ", "views": 22100, "date": "2026-03-20"}, {"text": "Похоже Composer 2 — это пост-трейн китайской Kimi 2.5  Сразу после выхода Composer 2 пользователи заметили что модель на эндпоинте называется kimi-k2p5-rl-0317-s515-fast, а чуть позже пошли (ныне удалённые) шокированные твиты от команды Kimi — по их словам…", "views": 17100, "date": "2026-03-20"}], "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21T21:48:41.984926", "messages": [{"id": 29, "channel_id": 102, "message_text": "Привет! Видно, что за каналом стоит реальный ресёрч опыт. Качественно разбираешь.\n\nЯ Маартен, разработчик из Голландии. Построил Triall - платформу, которая решает проблему галлюцинаций через adversarial reasoning.\n\nТри модели от разных компаний отвечают независимо, потом проводят анонимный peer review. Атакуют аргументы друг друга, верифицируют факты, находят логические дыры. Основано на H-Neurons paper (Tsinghua, arXiv 2512.01797).\n\nНа практике это убивает hallucinations: Gemini сфабриковал целые научные статьи с фейковыми авторами и DOI. Две другие модели это нашли и разнесли.\n\nОдна модель тебе поддакивает. Три модели вслепую ищут правду.\n\nХочу дать тебе бесплатную подписку навсегда, просто потестить.\n\nhttps://triall.ai?lng=ru&utm_source=telegram&utm_medium=outreach&utm_campaign=ai_newz", "language": "ru", "approved": 0, "sent_at": null, "response_received": 0, "response_text": null, "notes": null, "created_at": "2026-03-21 14:48:41"}]}, {"id": 103, "telegram_username": "neuraltimes", "title": "neural times", "description": null, "subscriber_count": 1, "language": "en", "avg_post_views": null, "avg_reactions": null, "reaction_view_ratio": null, "post_frequency": "sporadic", "admin_username": null, "admin_contact": null, "topics": [], "tone": "casual", "sample_posts": [{"text": "Channel created", "date": "2024-04-12"}, {"text": "Channel name was changed to «neuraltimes»", "date": "2024-10-25"}, {"text": "Channel name was cha ision", "Startups", "Science", "Education", "Productivity", "Hardware"], "tone": "casual", "sample_posts": [{"text": "🚀CodePilot: GUI для Claude CodeCodePilot — это настольное приложение с графическим интерфейсом для взаимодействия с Claude Code. Оно позволяет удобно общаться, писать код и управлять проектами без использования терминала. Приложение поддерживает управление сессиями, визуализацию файлов и настройку разрешений.🚀Основные моменты:-💬Реальное взаимодействие с Claude с поддержкой Markdown и подсветки синтаксиса.-📂Удобное управление сессиями и сохранение разговоров в SQLite.-🎯Контекст проекта с живым де", "views": 1980, "date": "2026-03-07"}, {"text": "🌟Внутренние исследования Cursor показывают, что Anthropic сильно субсидирует использование своих моделей, из-за чего конкурентам трудно с ней конкурировать.По словам человека, знакомого с внутренним анализом компании, Cursor оценивал в прошлом году, что подписка Claude Code за $200 в месяц могла потреблять до $2000 вычислительных ресурсов, что указывает на значительное субсидирование со стороны Anthropic.Сейчас ситуация стала еще более агрессивной.По словам другого источника, знакомого с анализо", "views": 1940, "date": "2026-03-08"}, {"text": "🔥На stepik вышел курс, который учитСоздавать настоящие AI-сервисы, а не просто запускать скрипты?Этот практический курс по Python и FastAPI покажет, как собрать полноценное приложение с ИИ, базой данных, автогенерацией контента и Telegram-ботом.Ты пройдёшь путь от первого HTTP-запроса до рабочего сервиса, который сам генерирует текст через ИИ, сохраняет данные, отправляет результаты по расписанию и отвечает пользователям.Никакой теории ради теории - только практические шаги, из которых рождается", "views": 2029, "date": "2026-03-08"}, {"text": "🙂POV: Senior Agentic Engineer@ai_machinelearning_big_data", "views": 1730, "date": "2026-03-08"}, {"text": "Память для AI-чипов Nvidia растёт взрывными темпами.Новый чипRubinтребует288 ГБ оперативной памяти только для работы.Чтобы понять масштаб:- это примернона 800% больше, чем в топовом настольном компьютере- и примернона 2300% больше, чем в флагманском смартфонеПричина — взрывной спрос со стороны AI-компаний.Крупные закупки со стороныOpenAIиAlphabetпрактически опустошили рынок памяти. В результате цена16GB DDR4выросла на2352% — до $76.90, что уже привело к серьёзному мировому дефициту памяти.Произв", "views": 2200, "date": "2026-03-09"}, {"text": "OpenAI может выйти на IPO не раньше чем черезшесть месяцев, но уже сейчас среди инвесторов есть заметный скепсис.Несмотря на огромную оценку компании около$850 млрд, первые обсуждения с инвесторами показывают неоднозначное отношение к будущему размещению.Главная причинапуть к прибыльности. По оценкам, OpenAI может продолжать активно сжигать деньгикак минимум до 2030 года.Ещё один фактор - высокая оценка бизнеса. Сейчас она составляет примерно28× прогнозной выручки 2026 года, что более чемв два р", "views": 2130, "date": "2026-03-10"}, {"text": "🚀Оптимизация затрат на LLM с ClawRouterClawRouter автоматически направляет запросы к самым дешевым моделям, экономя до 78% на расходах. Все операции происходят локально без внешних API, поддерживая более 30 моделей через один кошелек.🚀Основные моменты:- 100% локальная маршрутизация за <1мс- Нет внешних вызовов для принятия решений- Оплата за запросы с помощью USDC- Открытый исходный код под лицензией MIT- Поддержка множества моделей от разных провайдеров📌GitHub:https://github.com/BlockRunAI/Claw", "views": 2110, "date": "2026-03-11"}, {"text": "✔️Perplexity анонсировала автономную ИИ-систему на базе Mac mini.ИИ-поисковик предложил концепцию агента, который работает круглосуточно без участия пользователя. Personal Computer интегрируется с локальными файлами и приложениями на выделенном Mac mini, автономно выполняя сложные рабочие процессы. Система построена на гибридной архитектуре: взаимодействие с десктопом происходит локально, а тяжелые вычисления перенесены на серверы Perplexity.Ядро платформы - собственный движок оркестрации, котор", "views": 2060, "date": "2026-03-12"}, {"text": "🚀Высокопроизводительная диффузия на C++/CUDALibrediffusion — это реализация StreamDiffusion на C++ с использованием CUDA и TensorRT. Оптимизирована для высокой производительности на современных графических процессорах, обеспечивая стабильные кадры для генерации изображений.🚀Основные моменты:- Поддержка моделей SDXL Turbo и SD Turbo.- Высокая скорость: до 600 fps на RTX 5090.- Интеграция с ossia score для удобства использования.📌GitHub:https://github.com/jcelerier/librediffusion#cpp", "views": 1960, "date": "2026-03-13"}, {"text": "Программисты, которые переживают из-за ChatGPTМатематики, которые пережили изобретение калькулятора", "views": 1930, "date": "2026-03-14"}, {"text": "gpt 5.3 codexgpt 5.3 codex lowgpt 5.3 codex low fastgpt 5.3 codex minigpt 5.3 codex max highgpt 5.3 codex max lowgpt 5.3 codex max extra highgpt 5.3 codex max medium fastgpt 5.3 codex max high fastgpt 5.3 codex max low fastgpt 5.3 codex max extra high fast", "views": 2009, "date": "2026-03-14"}, {"text": "Бывшие учёные Anthropic запускают AI-стартап для научных открытий с оценкой $1 млрдКоманда бывших исследователей из Anthropic привлекает около $175 млн инвестиций для нового стартапа Mirendil, который оценивается примерно в $1 млрд. Их цель - ускорить научные открытия с помощью искусственного интеллекта.Идея проста: использовать AI для решения сложных научных задач и поиска прорывов в разных областях. Именно такие системы многие считают следующим большим этапом развития AI. Например, Sam Altman ", "views": 2020, "date": "2026-03-15"}, {"text": "🎂Немного с запозданием, но всё равно-с днём рождения, ChatGPT.С момента выхода GPT-4 прошло всего 3 (!) года, а мы уже прошли невероятный путь.Я помню, насколько безумным казалось общение с такой формой высокого интеллекта, которая при этом всё ещё имела множество ограничений.Однако большинство этих ограничений было преодолено всего за три года.И теперь почти невозможно в том, чтобы использовать ИИ не только для кода, а прямо на заводах: оптимизировать процессы, ускорять сборку, снижать издержки.Проект связан со стартапом Project Prometheus, который делает AI для инженерии и уже привлёк $6.2 млрд. В команду также вошёл David Limp из B", "views": 1370, "date": "2026-03-20"}, {"text": "⚡️Самый мощный режим ChatGPT — «не спеши, сначала подумай»Ты используешь ChatGPT как помощника.Но самый мощный режим —заставить его думать дольше.Большинство пишет:«Напиши код»Профи пишут:«Не отвечай сразу. Сначала продумай решение, варианты и риски.»Что это даёт:• меньше ошибок• меньше галлюцинаций• более продуманная архитектура• код уровня senior• лучше работает на сложных задачахЭто работает, потому что ты включаешь режим deliberate reasoning.Один промпт иjndtns становятся в разы умнее.t.me/C", "views": 1010, "date": "2026-03-20"}, {"text": "Яндекс приглашает на стажировку по машинному обучениюРаботайте с данными и моделями в продуктах Яндекса! Вас ждут реальные задачи, поддержка ментора и шанс попасть в штат.Вот лишь малая часть задач, которые реализуют стажёры:— обучение моделей для международного Поиска— улучшение качества поиска Маркета— обучение YandexGPT работе с внешней информацией— преобразование данных с сенсоров камер, лидаров и радаров в программные сущностиОткликайтесь, если вы понимаете классические алгоритмы, владеете ", "views": 995, "date": "2026-03-20"}], "tgstat_url": null, "source": "manual", "relevance_notes": null, "status": "message_ready", "created_at": "2026-03-21 13:41:23", "updated_at": "2026-03-21T21:48:41.989508", "messages": [{"id": 32, "channel_id": 105, "message_text": "Привет! Видел пост про CodePilot для Claude Code, хороший контент.\n\nЯ Маартен, разработчик из Голландии. Сделал Triall - фикс галлюцинаций нейросетей.\n\nТри модели от разных провайдеров отвечают на вопрос параллельно, потом анонимно рецензируют друг друга. Атакуют аргументы, верифицируют факты, находят логические дыры. Выдуманное не проходит.\n\nРеал
