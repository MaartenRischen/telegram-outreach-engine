<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Telegram Outreach{% endblock %}</title>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --text: #e6e6e6;
            --text-muted: #8a8a9a;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --success: #2ecc71;
            --warning: #f39c12;
            --border: #2a2a4a;
            --radius: 8px;
        }
        [data-theme="light"] {
            --bg: #f5f5f5;
            --bg-card: #ffffff;
            --bg-input: #e8e8e8;
            --text: #222222;
            --text-muted: #666666;
            --border: #dddddd;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        nav {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav .logo {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
        }
        nav .nav-links {
            display: flex;
            gap: 0.25rem;
        }
        nav a {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: var(--radius);
            font-size: 0.9rem;
            transition: all 0.15s;
        }
        nav a:hover, nav a.active {
            color: var(--text);
            background: var(--bg-input);
        }
        .theme-toggle {
            cursor: pointer;
            background: none;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius);
            font-size: 0.85rem;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1.5rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        h2 { font-size: 1.2rem; margin-bottom: 0.75rem; }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            margin-bottom: 1rem;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem;
            text-align: center;
        }
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
        }
        .stat-card .label {
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 0.75rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            cursor: pointer;
        }
        th:hover { color: var(--text); }
        tr:hover { background: rgba(233, 69, 96, 0.05); }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-discovered { background: var(--bg-input); color: var(--text-muted); }
        .badge-scraped { background: #1a3a5c; color: #5dade2; }
        .badge-message_ready { background: #1a3c1a; color: var(--success); }
        .badge-sent { background: #3c3a1a; color: var(--warning); }
        .badge-responded { background: #1a3c2a; color: #2ecc71; }
        .badge-declined { background: #3c1a1a; color: var(--accent); }
        .badge-no_response { background: #2a2a2a; color: #888; }
        .btn {
            display: inline-block;
            padding: 0.4rem 1rem;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.15s;
            text-decoration: none;
            color: #fff;
        }
        .btn-primary { background: var(--accent); }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #27ae60; }
        .btn-warning { background: var(--warning); }
        .btn-warning:hover { background: #e67e22; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
        .btn-group { display: flex; gap: 0.5rem; }
        select, input[type="text"], input[type="number"], textarea {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.9rem;
        }
        .filters {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .message-box {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            white-space: pre-wrap;
            font-size: 0.9rem;
            line-height: 1.5;
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
        }
        .channel-detail { font-size: 0.85rem; color: var(--text-muted); }
        .channel-detail strong { color: var(--text); }
        .followup-warning {
            border-left: 3px solid var(--warning);
            padding-left: 0.75rem;
        }
        .funnel {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }
        .funnel-step {
            text-align: center;
            padding: 0.75rem 1.25rem;
            border-radius: var(--radius);
            background: var(--bg-card);
            border: 1px solid var(--border);
            min-width: 120px;
        }
        .funnel-step .count {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
        }
        .funnel-step .step-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
        }
        .funnel-arrow {
            color: var(--text-muted);
            font-size: 1.2rem;
        }
        .expand-toggle {
            cursor: pointer;
            color: var(--accent);
            font-size: 0.85rem;
        }
        .expand-content { display: none; margin-top: 0.75rem; }
        .expand-content.show { display: block; }
        @media (max-width: 768px) {
            nav { padding: 0 1rem; }
            .container { padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); }
            table { font-size: 0.8rem; }
            th, td { padding: 0.5rem; }
            .funnel { flex-direction: column; }
            .funnel-arrow { transform: rotate(90deg); }
        }
    </style>
</head>
<body>
    <nav>
        <span class="logo">TG Outreach</span>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Pipeline</a>
            <a href="/channels" class="{% if '/channels' in request.path %}active{% endif %}">Channels</a>
            <a href="/outreach" class="{% if '/outreach' in request.path %}active{% endif %}">Outreach</a>
            <a href="/sent" class="{% if '/sent' in request.path %}active{% endif %}">Sent</a>
            <a href="/stats" class="{% if '/stats' in request.path %}active{% endif %}">Stats</a>
        </div>
        <button class="theme-toggle" onclick="toggleTheme()">Theme</button>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script>
        function toggleTheme() {
            const html = document.documentElement;
            html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', html.dataset.theme);
        }
        (function() {
            const saved = localStorage.getItem('theme');
            if (saved) document.documentElement.dataset.theme = saved;
        })();

        function copyToClipboard(text, btn) {
            navigator.clipboard.writeText(text).then(() => {
                const orig = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = orig, 1500);
            });
        }

        function toggleExpand(id) {
            document.getElementById(id).classList.toggle('show');
        }

        async function apiPost(url, data) {
            const resp = await fetch(url, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data || {}),
            });
            return resp.json();
        }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
